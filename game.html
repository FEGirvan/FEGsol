<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEG SOL - Banana Grabber Smooth</title>
    <style>
        :root {
            --feg-gold: #fec107;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh;
            background: radial-gradient(circle, #2a2a2a 0%, #000000 100%);
            color: white; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; touch-action: none; /* Mencegah layar goyang saat main */
        }

        #game-container {
            width: 100%; max-width: 400px; height: 600px;
            background: var(--glass-bg); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 30px;
            position: relative; box-shadow: 0 0 30px rgba(254, 193, 7, 0.2);
            overflow: hidden; touch-action: none;
        }

        #game-container::before {
            content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 32px; border: 2px solid var(--feg-gold);
            opacity: 0.5; animation: pulse-glow 2s infinite; pointer-events: none;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px var(--feg-gold); opacity: 0.3; }
            50% { box-shadow: 0 0 20px var(--feg-gold); opacity: 0.6; }
            100% { box-shadow: 0 0 5px var(--feg-gold); opacity: 0.3; }
        }

        #gorilla {
            width: 80px; height: 80px; position: absolute;
            bottom: 30px; left: 160px; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            /* Hapus transition biar gak delay pas di-drag */
            pointer-events: none; 
        }

        #gorilla img { width: 100%; height: 100%; object-fit: contain; }

        .banana {
            width: 45px; height: 45px; position: absolute; z-index: 5;
            display: flex; justify-content: center; align-items: center;
        }

        .banana img { width: 100%; height: 100%; object-fit: contain; }

        #score-board {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6); padding: 10px 25px;
            border-radius: 50px; border: 1px solid var(--glass-border);
            font-size: 18px; font-weight: bold; color: var(--feg-gold); z-index: 20;
        }

        #game-over-screen {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px); justify-content: center;
            align-items: center; flex-direction: column; z-index: 100;
        }

        button {
            margin-top: 25px; padding: 12px 35px; font-size: 16px;
            background: var(--feg-gold); border: none; border-radius: 50px;
            cursor: pointer; color: black; font-weight: bold; text-transform: uppercase;
        }

        .hint {
            position: absolute; bottom: 10px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.3); font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">REWARD: <span id="score">0</span> 🍌</div>
        <div id="gorilla"></div>
        
        <div id="game-over-screen">
            <h1>MISSION FAILED!</h1>
            <p>You grabbed <span id="final-score">0</span> bananas.</p>
            <button onclick="startGame()">Try Again</button>
        </div>
        <div class="hint">DRAG TO MOVE GORILLA</div>
    </div>

    <script>
        /* --- KOTAK PENGATURAN --- */
        const URL_GAMBAR_GORILLA = "GANTI_ALAMAT_PNG_DI_SINI"; 
        const URL_GAMBAR_BANANA = "GANTI_ALAMAT_PNG_DI_SINI";

        const gorilla = document.getElementById('gorilla');
        const gameContainer = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');

        let gorillaLeft = 160;
        let score = 0;
        let isGameOver = false;
        let gameInterval, bananaInterval;
        let speed = 5;

        function initAssets() {
            if (URL_GAMBAR_GORILLA !== "GANTI_ALAMAT_PNG_DI_SINI") {
                gorilla.innerHTML = `<img src="${URL_GAMBAR_GORILLA}" alt="Gorilla">`;
            } else {
                gorilla.style.fontSize = "60px";
                gorilla.innerText = "🦍";
            }
        }

        function startGame() {
            initAssets();
            isGameOver = false;
            score = 0; speed = 5;
            scoreElement.innerText = '0';
            gorillaLeft = 160;
            gorilla.style.left = gorillaLeft + 'px';
            gameOverScreen.style.display = 'none';
            document.querySelectorAll('.banana').forEach(b => b.remove());

            gameInterval = setInterval(gameLoop, 20);
            bananaInterval = setInterval(createBanana, 1000);
        }

        // KONTROL DRAG (SMOOTH MOVE)
        function handleMove(clientX) {
            if (isGameOver) return;
            const rect = gameContainer.getBoundingClientRect();
            const relativeX = clientX - rect.left;
            
            // Atur posisi tengah gorilla agar tepat di bawah jari
            gorillaLeft = relativeX - (gorilla.offsetWidth / 2);

            // Batasan agar tidak keluar box
            if (gorillaLeft < 5) gorillaLeft = 5;
            if (gorillaLeft > rect.width - gorilla.offsetWidth - 5) {
                gorillaLeft = rect.width - gorilla.offsetWidth - 5;
            }

            gorilla.style.left = gorillaLeft + 'px';
        }

        // Event untuk Mouse (PC)
        gameContainer.addEventListener('mousemove', (e) => {
            if(e.buttons === 1) handleMove(e.clientX); // Geser sambil klik kiri
        });

        // Event untuk Touch (HP) - INI YANG BIKIN SMOOTH
        gameContainer.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientX);
            e.preventDefault(); 
        }, {passive: false});

        function createBanana() {
            if (isGameOver) return;
            const banana = document.createElement('div');
            banana.classList.add('banana');
            if (URL_GAMBAR_BANANA !== "GANTI_ALAMAT_PNG_DI_SINI") {
                banana.innerHTML = `<img src="${URL_GAMBAR_BANANA}" alt="Banana">`;
            } else {
                banana.style.fontSize = "35px";
                banana.innerText = "🍌";
            }
            banana.style.left = (Math.random() * (gameContainer.offsetWidth - 50) + 5) + 'px';
            banana.style.top = '-50px';
            gameContainer.appendChild(banana);
            if(score > 15) speed = 7;
            if(score > 30) speed = 10;
        }

        function gameLoop() {
            if (isGameOver) return;
            document.querySelectorAll('.banana').forEach(banana => {
                let top = parseInt(banana.style.top);
                banana.style.top = (top + speed) + 'px';
                if (top > 600) endGame();
                if (isColliding(gorilla, banana)) {
                    score++;
                    scoreElement.innerText = score;
                    banana.remove();
                }
            });
        }

        function isColliding(a, b) {
            const aR = a.getBoundingClientRect();
            const bR = b.getBoundingClientRect();
            return !(aR.top > bR.bottom-10 || aR.bottom < bR.top+10 || aR.left > bR.right-10 || aR.right < bR.left+10);
        }

        function endGame() {
            isGameOver = true;
            clearInterval(gameInterval); clearInterval(bananaInterval);
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        startGame();
    </script>
</body>
</html>
