<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEG SOL | Jungle King Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap');
        
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; touch-action: none; margin: 0;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        /* VIEWPORT DENGAN BACKGROUND HUTAN BARU */
        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            /* LINK GAMBAR HUTAN DI SINI */
            background: url('[attachment_0](attachment)') no-repeat center center;
            background-size: cover;
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        /* Overlay gelap sedikit biar pisang & monyet lebih kelihatan */
        #game-container::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent 30%, rgba(0,0,0,0.5));
            pointer-events: none;
        }

        /* GORILLA & BANANA */
        #gorilla { 
            width: 90px; height: 90px; 
            position: absolute; bottom: 50px; left: 50%; 
            transform: translateX(-50%); z-index: 20;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.6));
        }
        
        .banana { 
            width: 45px; height: 45px; 
            position: absolute; z-index: 15; 
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.4));
        }

        #gorilla img, .banana img { width: 100%; height: 100%; object-fit: contain; }

        /* UI ELEMENTS */
        .ui-panel {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 30;
        }

        .score-box { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 12px; border: 1px solid rgba(255,215,0,0.3); }
        .rank-box { background: rgba(124, 58, 237, 0.4); padding: 5px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
    </style>
</head>
<body onload="initGame()">

    <main id="game-container">
        <div class="ui-panel">
            <div class="score-box">
                <p class="text-[8px] font-orbitron text-yellow-400 uppercase">Score</p>
                <p class="text-2xl font-bold font-orbitron text-white" id="score-val">0</p>
            </div>
            <div class="rank-box text-right">
                <p class="text-[8px] font-orbitron text-purple-200 uppercase">Status</p>
                <p id="live-rank" class="text-[10px] font-orbitron font-bold text-white uppercase italic">Baby Ape</p>
            </div>
        </div>

        <div id="gorilla"><img src="G.PNG"></div>

        <div id="game-over" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/90 text-center px-10">
            <h2 class="font-orbitron text-4xl font-bold text-red-500 mb-2 italic">BUSTED!</h2>
            <p id="final-rank" class="font-orbitron text-lg text-yellow-400 mb-8 uppercase"></p>
            <button onclick="initGame()" class="bg-yellow-500 hover:bg-yellow-400 px-12 py-4 rounded-full font-orbitron text-xs font-bold text-black shadow-xl transition-all active:scale-90">TRY AGAIN</button>
        </div>
    </main>

    <script>
        let score = 0, isGameOver = false, speed = 5;
        const container = document.getElementById('game-container');
        const gorilla = document.getElementById('gorilla');
        let gameLoop, spawnLoop;

        function initGame() {
            score = 0; isGameOver = false; speed = 5;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('live-rank').innerText = "Baby Ape";
            
            document.querySelectorAll('.banana').forEach(b => b.remove());
            
            clearInterval(gameLoop); clearInterval(spawnLoop);
            gameLoop = setInterval(update, 20);
            spawnLoop = setInterval(createBanana, 1000);
        }

        function createBanana() {
            if(isGameOver) return;
            const b = document.createElement('div');
            b.className = 'banana';
            b.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/3143/3143641.png">`;
            const maxX = container.offsetWidth - 50;
            b.style.left = Math.floor(Math.random() * maxX) + 'px';
            b.style.top = '-60px';
            container.appendChild(b);
        }

        function update() {
            if(isGameOver) return;
            const bananas = document.querySelectorAll('.banana');
            
            bananas.forEach(b => {
                let top = parseInt(b.style.top);
                b.style.top = (top + speed) + 'px';

                if(checkCollision(gorilla, b)) {
                    score++;
                    document.getElementById('score-val').innerText = score;
                    updateRank(score);
                    b.remove();
                }

                if(top > container.offsetHeight) {
                    gameOver();
                }
            });
        }

        function updateRank(s) {
            const rank = document.getElementById('live-rank');
            if(s >= 100) { rank.innerText = "Golden Kong 🏆"; rank.style.color = "#facc15"; }
            else if(s >= 50) { rank.innerText = "Silverback 🥈"; rank.style.color = "#e2e8f0"; }
            
            if(s % 10 === 0) speed += 0.3;
        }

        function checkCollision(a, b) {
            const r1 = a.getBoundingClientRect();
            const r2 = b.getBoundingClientRect();
            // Collision box dikecilkan sedikit biar pas sama gambar monyetnya
            return !(r1.right < r2.left + 5 || r1.left > r2.right - 5 || r1.bottom < r2.top + 5 || r1.top > r2.bottom - 5);
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('final-rank').innerText = "Rank: " + document.getElementById('live-rank').innerText;
        }

        // --- FIX SLIDE KANAN TOTAL ---
        container.addEventListener('touchmove', (e) => {
            if(isGameOver) return;
            const rect = container.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            
            let newX = touchX - (gorilla.offsetWidth / 2);

            // Hitungan presisi batas kiri & kanan
            const minX = 0;
            const maxX = container.offsetWidth - gorilla.offsetWidth;

            if (newX < minX) newX = minX;
            if (newX > maxX) newX = maxX;

            gorilla.style.left = newX + 'px';
            gorilla.style.transform = 'none'; // Menghilangkan transform bawaan biar gak stuck di kanan
            e.preventDefault();
        }, {passive: false});

        // Test PC Mouse
        container.addEventListener('mousemove', (e) => {
            if(isGameOver) return;
            const rect = container.getBoundingClientRect();
            let newX = (e.clientX - rect.left) - (gorilla.offsetWidth / 2);
            const maxX = container.offsetWidth - gorilla.offsetWidth;
            if (newX < 0) newX = 0;
            if (newX > maxX) newX = maxX;
            gorilla.style.left = newX + 'px';
            gorilla.style.transform = 'none';
        });
    </script>
</body>
</html>
