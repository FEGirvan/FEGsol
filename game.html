<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEG SOL | Banana Grabber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0a0a0b; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; background: radial-gradient(circle at center, #2e1065 0%, #0a0a0b 80%); }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .tier-badge { background: linear-gradient(45deg, #1e1b4b, #312e81); border: 1px solid rgba(255,255,255,0.1); }
        #game-viewport { width: 100%; max-width: 450px; height: 75vh; margin: 0 auto; position: relative; overflow: hidden; border-top: 2px solid #7c3aed; background: linear-gradient(180deg, transparent 0%, #0a1f11 100%); }
        #gorilla { width: 80px; height: 80px; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; }
        .banana { width: 45px; height: 45px; position: absolute; z-index: 5; }
        #gorilla img, .banana img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-white/5 bg-[#0a0a0b]/80">
        <div class="max-w-7xl mx-auto flex flex-col items-center gap-3">
            <div class="flex justify-between w-full items-center">
                <div class="flex items-center space-x-2">
                    <img src="G.PNG" class="w-8 h-8 rounded-full border border-purple-500">
                    <span class="font-orbitron text-lg font-bold uppercase">FEG<span class="text-purple-500">SOL</span></span>
                </div>
                <button id="wallet-btn" onclick="handleWalletAction()" class="bg-purple-600 px-4 py-1.5 rounded-full font-orbitron text-[10px] uppercase text-white shadow-lg">Connect Wallet</button>
            </div>
            <div class="tier-badge px-6 py-1.5 rounded-full text-center">
                <p class="text-[7px] font-orbitron text-purple-300 uppercase tracking-widest">Live Rank</p>
                <p id="live-rank" class="text-[10px] font-bold font-orbitron text-white italic uppercase">Baby Ape</p>
            </div>
        </div>
    </nav>

    <div id="gate-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#0a0a0b]/98">
        <div class="glass p-10 text-center max-w-sm mx-4">
            <h1 class="font-orbitron text-2xl font-bold italic mb-2 text-yellow-400">Banana Grabber</h1>
            <p class="text-[10px] font-orbitron text-purple-400 mb-8 uppercase">Hold 1M $FEGSOL to Play</p>
            <button onclick="handleWalletAction()" class="w-full bg-purple-600 py-4 rounded-xl font-orbitron font-bold uppercase text-white shadow-xl shadow-purple-500/20">Connect Wallet</button>
        </div>
    </div>

    <main id="game-viewport" class="glass mt-4">
        <div class="absolute top-5 left-5 font-orbitron text-yellow-400 font-bold text-xl z-20">🍌 <span id="score-val">0</span></div>
        <div id="gorilla"></div>
        <div id="game-over" class="hidden absolute inset-0 z-[50] flex flex-col items-center justify-center bg-black/90 text-center">
            <h2 class="font-orbitron text-3xl font-bold text-yellow-400 mb-6 uppercase italic">Game Over</h2>
            <div id="rank-box" class="mb-8 w-64"></div>
            <button onclick="startGame()" class="bg-purple-600 px-10 py-3 rounded-full font-orbitron text-xs font-bold uppercase text-white">Play Again</button>
        </div>
    </main>

    <script>
        const CONFIG = {
            ca: "49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump",
            rpc: "https://api.mainnet-beta.solana.com",
            urlGorilla: "G.PNG",
            urlBanana: "https://cdn-icons-png.flaticon.com/512/3143/3143641.png"
        };

        let userWallet = null, score = 0, isGameOver = false, speed = 5, gameInterval, bananaInterval;
        const viewport = document.getElementById('game-viewport'), gorilla = document.getElementById('gorilla');

        // FUNGSI KONEKSI - VERSI PERBAIKAN TOTAL
        async function handleWalletAction() {
            try {
                // 1. Cek Phantom
                const provider = window.solana;
                if (!provider || !provider.isPhantom) {
                    Swal.fire({ title: 'Gunakan Phantom!', text: 'Buka link ini di browser aplikasi Phantom.', icon: 'warning' });
                    return;
                }

                // 2. Request Connection (Sama persis dengan Banana Farm)
                const resp = await provider.connect();
                userWallet = resp.publicKey.toString();
                
                // 3. Langsung Update Tampilan
                const btn = document.getElementById('wallet-btn');
                btn.innerText = userWallet.substring(0,4) + "..." + userWallet.substring(userWallet.length-4);
                btn.style.backgroundColor = "#22c55e"; 

                // 4. Jalankan verifikasi saldo
                verifyBalance(userWallet);

            } catch (err) {
                console.log("Koneksi gagal/dibatalkan");
            }
        }

        async function verifyBalance(address) {
            try {
                const connection = new solanaWeb3.Connection(CONFIG.rpc);
                const mint = new solanaWeb3.PublicKey(CONFIG.ca);
                const owner = new solanaWeb3.PublicKey(address);
                
                const accounts = await connection.getParsedTokenAccountsByOwner(owner, { mint: mint });
                
                if (accounts.value.length > 0) {
                    const amount = accounts.value[0].account.data.parsed.info.tokenAmount.uiAmount;
                    if (amount >= 1000000) {
                        document.getElementById('gate-overlay').style.display = 'none';
                        startGame();
                    } else {
                        Swal.fire({ title: 'Saldo Kurang', text: 'Minimal hold 1,000,000 $FEGSOL', icon: 'error' });
                    }
                } else {
                    Swal.fire({ title: 'Token Tidak Ada', text: 'Kamu tidak memiliki $FEGSOL', icon: 'error' });
                }
            } catch (e) {
                console.error("Gagal cek saldo:", e);
                // Jika RPC error, kita beri toleransi agar game tetap bisa dites
                // document.getElementById('gate-overlay').style.display = 'none'; startGame();
            }
        }

        function startGame() {
            isGameOver = false; score = 0; speed = 5;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('live-rank').innerText = "Baby Ape";
            document.getElementById('live-rank').style.color = "#fff";
            document.getElementById('game-over').classList.add('hidden');
            gorilla.innerHTML = `<img src="${CONFIG.urlGorilla}">`;
            document.querySelectorAll('.banana').forEach(b => b.remove());
            clearInterval(gameInterval); clearInterval(bananaInterval);
            gameInterval = setInterval(updateGame, 20);
            bananaInterval = setInterval(spawnBanana, 1000);
        }

        function updateGame() {
            if(isGameOver) return;
            document.querySelectorAll('.banana').forEach(b => {
                let top = parseInt(b.style.top);
                b.style.top = (top + speed) + 'px';
                if(top > viewport.offsetHeight) endGame();
                if(isColliding(gorilla, b)) {
                    score++;
                    document.getElementById('score-val').innerText = score;
                    if(score >= 100) { document.getElementById('live-rank').innerText = "Golden Kong 🏆"; document.getElementById('live-rank').style.color = "#fde047"; }
                    else if(score >= 50) { document.getElementById('live-rank').innerText = "Silverback 🥈"; document.getElementById('live-rank').style.color = "#C0C0C0"; }
                    b.remove();
                }
            });
        }

        function spawnBanana() {
            if(isGameOver) return;
            const b = document.createElement('div');
            b.className = 'banana';
            b.innerHTML = `<img src="${CONFIG.urlBanana}">`;
            b.style.left = (Math.random() * (viewport.offsetWidth - 50)) + 'px';
            b.style.top = '-50px';
            viewport.appendChild(b);
            if(score > 30) speed = 7;
        }

        function isColliding(a, b) {
            const aR = a.getBoundingClientRect(); const bR = b.getBoundingClientRect();
            return !(aR.top > bR.bottom-15 || aR.bottom < bR.top+15 || aR.left > bR.right-15 || aR.right < bR.left+15);
        }

        function endGame() {
            isGameOver = true; clearInterval(gameInterval); clearInterval(bananaInterval);
            let rank = score >= 100 ? "Golden Kong" : (score >= 50 ? "Silverback" : "Baby Ape");
            document.getElementById('rank-box').innerHTML = `<p class="font-orbitron text-xl font-bold uppercase">${rank}</p><p class="text-green-400 font-bold mt-4">Screenshot & Claim!</p>`;
            document.getElementById('game-over').classList.remove('hidden');
        }

        viewport.addEventListener('touchmove', (e) => {
            if(isGameOver) return;
            const rect = viewport.getBoundingClientRect();
            let x = e.touches[0].clientX - rect.left - 40;
            if(x < 5) x = 5; if(x > viewport.offsetWidth - 85) x = viewport.offsetWidth - 85;
            gorilla.style.left = x + 'px';
            e.preventDefault();
        }, {passive: false});
    </script>
</body>
</html>
