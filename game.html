<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEG SOL | Banana Grabber Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap');
        
        body { 
            background: #0a0a0b; color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; overflow: hidden; touch-action: none;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        /* HEADER */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: transparent;
            position: relative; z-index: 50;
        }

        .logo-section { display: flex; align-items: center; gap: 10px; }
        .logo-circle { 
            width: 35px; height: 35px; border-radius: 50%; 
            border: 1px solid #7c3aed; overflow: hidden; 
        }

        .btn-wallet {
            background: #8b5cf6; 
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
            padding: 8px 20px; border-radius: 99px;
            font-size: 10px; font-weight: bold; text-transform: uppercase;
        }

        /* STATUS BADGE */
        .status-badge {
            background: linear-gradient(180deg, #1e1b4b 0%, #111827 100%);
            border: 1px solid #3730a3; border-radius: 20px;
            padding: 5px 25px; display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* FRAME GAME - DITURUNKAN MARGIN-NYA */
        #game-frame {
            width: 90%; max-width: 400px; height: 70vh; /* Sedikit disesuaikan tingginya */
            margin: 40px auto 20px; /* Margin atas ditambah menjadi 40px agar lebih turun */
            position: relative; overflow: hidden;
            border-radius: 30px; 
            border: 2px solid rgba(139, 92, 246, 0.3);
            background: url('hutan.PNG') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* GORILLA PLAYER */
        #gorilla { 
            width: 100px; height: 100px; 
            position: absolute; bottom: 40px; left: 50%; 
            transform: translateX(-50%); z-index: 20; 
        }
        
        #gorilla-img { width: 100%; height: 100%; object-fit: contain; }

        .banana { width: 45px; height: 45px; position: absolute; z-index: 15; }
        .banana img { width: 100%; height: 100%; object-fit: contain; }

        .score-box {
            position: absolute; top: 20px; left: 20px; z-index: 30;
            display: flex; align-items: center; gap: 5px;
            background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 8px;
        }

        #game-over {
            position: absolute; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body onload="initGame()">

    <nav>
        <div class="logo-section">
            <div class="logo-circle"><img src="G.PNG" style="width:100%; height:100%;"></div>
            <div class="font-orbitron font-bold text-lg tracking-tighter">FEG<span class="text-purple-500">SOL</span></div>
        </div>
        <button class="btn-wallet font-orbitron">Connect Wallet</button>
    </nav>

    <div class="flex justify-center mt-2">
        <div class="status-badge">
            <span class="text-yellow-500 text-xs">👑</span>
            <div class="text-center">
                <p class="text-[7px] font-orbitron text-purple-300 uppercase tracking-widest">Your Gorilla Status</p>
                <p id="live-rank" class="text-[11px] font-orbitron font-bold uppercase italic text-white">Level: Baby Ape</p>
            </div>
        </div>
    </div>

    <main id="game-frame">
        <div class="score-box">
            <span class="text-lg">🍌</span>
            <span id="score-val" class="font-orbitron font-bold text-yellow-400 text-xl">0</span>
        </div>

        <div id="gorilla">
            <img id="gorilla-img" src="monyet kanan.PNG">
        </div>

        <div id="game-over">
            <h2 class="font-orbitron text-4xl font-bold text-red-500 mb-2 italic">BUSTED!</h2>
            <p id="final-rank" class="font-orbitron text-sm text-yellow-400 mb-8 uppercase"></p>
            <button onclick="initGame()" class="bg-purple-600 px-10 py-3 rounded-full font-orbitron text-[10px] font-bold text-white shadow-xl">PLAY AGAIN</button>
        </div>
    </main>

    <script>
        let score = 0, isGameOver = false, speed = 4.5;
        let lastX = 0; 
        const frame = document.getElementById('game-frame');
        const gorilla = document.getElementById('gorilla');
        const gorillaImg = document.getElementById('gorilla-img');
        let gameLoop, spawnLoop;

        function initGame() {
            score = 0; isGameOver = false; speed = 4.5;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('live-rank').innerText = "Level: Baby Ape";
            document.querySelectorAll('.banana').forEach(b => b.remove());
            clearInterval(gameLoop); clearInterval(spawnLoop);
            gameLoop = setInterval(update, 20);
            spawnLoop = setInterval(createBanana, 1000);
        }

        function createBanana() {
            if(isGameOver) return;
            const b = document.createElement('div');
            b.className = 'banana';
            b.innerHTML = `<img src="banana.PNG">`;
            const maxX = frame.offsetWidth - 50;
            b.style.left = Math.floor(Math.random() * maxX) + 'px';
            b.style.top = '-50px';
            frame.appendChild(b);
        }

        function update() {
            if(isGameOver) return;
            document.querySelectorAll('.banana').forEach(b => {
                let top = parseInt(b.style.top);
                b.style.top = (top + speed) + 'px';
                if(checkCollision(gorilla, b)) {
                    score++;
                    document.getElementById('score-val').innerText = score;
                    updateRank(score);
                    b.remove();
                }
                if(top > frame.offsetHeight) gameOver();
            });
        }

        function updateRank(s) {
            const rank = document.getElementById('live-rank');
            if(s >= 100) { rank.innerText = "Level: Golden Kong 🏆"; rank.style.color = "#fbbf24"; }
            else if(s >= 50) { rank.innerText = "Level: Silverback 🥈"; rank.style.color = "#e2e8f0"; }
            if(s % 10 === 0 && s > 0) speed += 0.3;
        }

        function checkCollision(a, b) {
            const r1 = a.getBoundingClientRect(); const r2 = b.getBoundingClientRect();
            return !(r1.right < r2.left + 15 || r1.left > r2.right - 15 || r1.bottom < r2.top + 15 || r1.top > r2.bottom - 15);
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop); clearInterval(spawnLoop);
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-rank').innerText = document.getElementById('live-rank').innerText;
        }

        const moveHandler = (e) => {
            if(isGameOver) return;
            const rect = frame.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let currentX = clientX - rect.left;
            
            if (currentX < lastX) {
                gorillaImg.src = "monyet kiri.PNG";
            } else if (currentX > lastX) {
                gorillaImg.src = "monyet kanan.PNG";
            }
            lastX = currentX;

            let newX = currentX - (gorilla.offsetWidth / 2);
            const maxX = frame.offsetWidth - gorilla.offsetWidth;
            
            if (newX < 0) newX = 0; 
            if (newX > maxX) newX = maxX;
            
            gorilla.style.left = newX + 'px';
            gorilla.style.transform = 'none';
            if(e.cancelable) e.preventDefault();
        };

        frame.addEventListener('touchmove', moveHandler, {passive: false});
        frame.addEventListener('mousemove', moveHandler);
    </script>
</body>
</html>
