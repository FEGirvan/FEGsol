<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEG SOL - Banana Grabber LIVE</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        :root {
            --feg-gold: #fec107;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --jungle-dark: #0a1f11;
        }

        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, var(--jungle-dark) 100%);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; touch-action: none; position: relative;
        }

        /* ORNAMEN HUTAN KANAN KIRI */
        body::before, body::after {
            content: ""; position: absolute; bottom: -20px;
            width: 250px; height: 250px; background-size: contain;
            background-repeat: no-repeat; opacity: 0.15; z-index: 1; pointer-events: none;
        }
        body::before { left: -30px; background-image: url('https://cdn-icons-png.flaticon.com/512/628/628283.png'); } /* Ikon Rumput/Pohon */
        body::after { right: -30px; background-image: url('https://cdn-icons-png.flaticon.com/512/628/628283.png'); transform: scaleX(-1); }

        /* OVERLAY CONNECT WALLET */
        #gate-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
        }

        .gate-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 35px; text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5); width: 85%; max-width: 380px;
        }

        .live-badge {
            background: #ff0000; color: white; padding: 6px 18px;
            border-radius: 50px; font-size: 11px; font-weight: bold;
            display: inline-block; margin-bottom: 20px; animation: blink 1.2s infinite;
            text-transform: uppercase; letter-spacing: 1.5px;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* GAME CONTAINER */
        #game-container {
            width: 100%; max-width: 400px; height: 600px;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 40px;
            position: relative; overflow: hidden; z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        #gorilla {
            width: 85px; height: 85px; position: absolute;
            bottom: 35px; left: 157px; z-index: 10; pointer-events: none;
        }

        #gorilla img, .banana img { width: 100%; height: 100%; object-fit: contain; }
        .banana { width: 48px; height: 48px; position: absolute; z-index: 5; }

        #score-board {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75); padding: 12px 30px;
            border-radius: 50px; border: 1px solid var(--glass-border);
            font-size: 16px; font-weight: bold; color: var(--feg-gold); z-index: 20;
            letter-spacing: 1px; text-transform: uppercase;
        }

        #game-over-screen {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(12px); justify-content: center;
            align-items: center; flex-direction: column; z-index: 100;
        }

        .btn-gold {
            background: var(--feg-gold); border: none; border-radius: 50px;
            padding: 16px 40px; font-size: 14px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; color: black; margin-top: 20px;
            transition: all 0.2s; box-shadow: 0 5px 15px rgba(254, 193, 7, 0.3);
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(254, 193, 7, 0.4); }
        .btn-gold:active { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="gate-overlay">
        <div class="gate-card">
            <div class="live-badge">FEGSOL IS LIVE 🚀</div>
            <h2 style="color:var(--feg-gold); margin: 0 0 10px 0; letter-spacing: 1px;">WHALE ACCESS</h2>
            <p style="font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6;">
                Verifikasi kepemilikan minimal<br>
                <b style="color:white; font-size: 18px;">1,000,000 $FEGSOL</b><br>
                untuk mulai mengumpulkan pisang!
            </p>
            <button class="btn-gold" id="connect-btn" onclick="connectAndCheck()">Connect Phantom</button>
        </div>
    </div>

    <div id="game-container">
        <div id="score-board">REWARD: <span id="score">0</span> 🍌</div>
        <div id="gorilla"></div>
        
        <div id="game-over-screen">
            <h1 style="color:var(--feg-gold); font-size: 36px; margin-bottom: 0;">GAME OVER!</h1>
            <p style="font-size: 18px; opacity: 0.8;">Skor Kamu: <span id="final-score" style="color:var(--feg-gold); font-weight:bold;">0</span></p>
            <button class="btn-gold" onclick="startGame()">Main Lagi</button>
        </div>
    </div>

    <script>
        /* --- KOTAK SETUP (GANTI DI SINI) --- */
        const CA_FEGSOL = "GANTI_DENGAN_CA_ASLI_ABANG"; 
        const URL_GORILLA = "GANTI_ALAMAT_PNG_GORILLA"; 
        const URL_BANANA = "GANTI_ALAMAT_PNG_BANANA";

        const gorilla = document.getElementById('gorilla');
        const gameContainer = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over-screen');

        let gorillaLeft = 157;
        let score = 0;
        let isGameOver = false;
        let speed = 5;
        let gameInterval, bananaInterval;

        // 1. LOGIKA WEB3 ASLI (CEK SALDO)
        async function connectAndCheck() {
            const btn = document.getElementById('connect-btn');
            
            if (window.solana && window.solana.isPhantom) {
                try {
                    btn.innerText = "Verifikasi...";
                    const response = await window.solana.connect();
                    const walletAddress = response.publicKey.toString();
                    
                    const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");
                    const mintPubKey = new solanaWeb3.PublicKey(CA_FEGSOL);
                    
                    const tokenAccounts = await connection.getParsedTokenAccountsByOwner(
                        new solanaWeb3.PublicKey(walletAddress),
                        { mint: mintPubKey }
                    );

                    if (tokenAccounts.value.length > 0) {
                        const balance = tokenAccounts.value[0].account.data.parsed.info.tokenAmount.uiAmount;
                        
                        if (balance >= 1000000) {
                            document.getElementById('gate-overlay').style.display = 'none';
                            startGame();
                        } else {
                            alert("Saldo Tidak Cukup! Kamu cuma punya " + Math.floor(balance).toLocaleString() + " $FEGSOL.");
                            btn.innerText = "Connect Phantom";
                        }
                    } else {
                        alert("Kamu belum punya token $FEGSOL!");
                        btn.innerText = "Connect Phantom";
                    }

                } catch (err) { 
                    alert("Koneksi Dibatalkan."); 
                    btn.innerText = "Connect Phantom";
                }
            } else { 
                alert("Harap install Phantom Wallet di browser/HP kamu!"); 
            }
        }

        // 2. SISTEM GAME
        function initAssets() {
            gorilla.innerHTML = URL_GORILLA.includes("PNG") ? `<img src="${URL_GORILLA}">` : `<span style="font-size:65px;">🦍</span>`;
        }

        function startGame() {
            initAssets();
            isGameOver = false; score = 0; speed = 5;
            scoreElement.innerText = '0';
            gorillaLeft = 157;
            gorilla.style.left = gorillaLeft + 'px';
            gameOverScreen.style.display = 'none';
            document.querySelectorAll('.banana').forEach(b => b.remove());
            gameInterval = setInterval(gameLoop, 20);
            bananaInterval = setInterval(createBanana, 1000);
        }

        function handleMove(clientX) {
            if (isGameOver) return;
            const rect = gameContainer.getBoundingClientRect();
            gorillaLeft = (clientX - rect.left) - (gorilla.offsetWidth / 2);
            if (gorillaLeft < 8) gorillaLeft = 8;
            if (gorillaLeft > (rect.width - gorilla.offsetWidth - 8)) gorillaLeft = rect.width - gorilla.offsetWidth - 8;
            gorilla.style.left = gorillaLeft + 'px';
        }

        gameContainer.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientX);
            e.preventDefault();
        }, {passive: false});

        function createBanana() {
            if (isGameOver) return;
            const b = document.createElement('div');
            b.className = 'banana';
            b.innerHTML = URL_BANANA.includes("PNG") ? `<img src="${URL_BANANA}">` : `<span style="font-size:38px;">🍌</span>`;
            b.style.left = (Math.random() * (gameContainer.offsetWidth - 50) + 5) + 'px';
            b.style.top = '-60px';
            gameContainer.appendChild(b);
            if(score > 12) speed = 7.5;
            if(score > 25) speed = 9.5;
        }

        function gameLoop() {
            if (isGameOver) return;
            document.querySelectorAll('.banana').forEach(b => {
                let top = parseInt(b.style.top);
                b.style.top = (top + speed) + 'px';
                if (top > 600) endGame();
                if (isColliding(gorilla, b)) { score++; scoreElement.innerText = score; b.remove(); }
            });
        }

        function isColliding(a, b) {
            const aR = a.getBoundingClientRect(); const bR = b.getBoundingClientRect();
            return !(aR.top > bR.bottom-12 || aR.bottom < bR.top+12 || aR.left > bR.right-12 || aR.right < bR.left+12);
        }

        function endGame() {
            isGameOver = true;
            clearInterval(gameInterval); clearInterval(bananaInterval);
            document.getElementById('final-score').innerText = score;
            gameOverScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
