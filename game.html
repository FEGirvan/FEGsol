<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEG SOL | Banana Farm Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap');
        
        body { 
            background: #0a0a0b; color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; overflow: hidden; touch-action: none;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        /* HEADER STYLE BANANA FARM */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(10, 10, 11, 0.98);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative; z-index: 50;
        }

        /* BADGE EVOLUSI DI TENGAH (Sama kayak Banana Farm) */
        .evolution-container {
            display: flex; justify-content: center; margin-top: 15px;
            position: relative; z-index: 50;
        }
        .evolution-badge {
            background: linear-gradient(45deg, #1e1b4b, #312e81);
            padding: 8px 35px; border-radius: 99px; border: 1px solid rgba(124, 58, 237, 0.4);
            text-align: center; box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
        }

        /* FRAME GAME DENGAN BACKGROUND HUTAN.PNG */
        #game-viewport {
            width: 92%; max-width: 420px; height: 72vh;
            margin: 20px auto; position: relative; overflow: hidden;
            border-radius: 28px; border: 1px solid rgba(255,255,255,0.1);
            background: url('hutan.PNG') no-repeat center center;
            background-size: cover;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* GORILLA & BANANA */
        #gorilla { 
            width: 85px; height: 85px; 
            position: absolute; bottom: 30px; left: 50%; 
            transform: translateX(-50%); z-index: 20;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }
        
        .banana { 
            width: 45px; height: 45px; 
            position: absolute; z-index: 15; 
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }

        #gorilla img, .banana img { width: 100%; height: 100%; object-fit: contain; }

        /* SKOR OVERLAY DI DALAM KOTAK */
        .score-display {
            position: absolute; top: 20px; left: 20px; z-index: 30;
            background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 12px;
            backdrop-filter: blur(4px); border: 1px solid rgba(255,215,0,0.2);
        }

        /* GAME OVER SCREEN */
        #game-over {
            position: absolute; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body onload="initGame()">

    <nav>
        <div class="font-orbitron font-bold text-lg tracking-tighter">
            FEG <span class="text-purple-500">SOL</span>
        </div>
        <button class="bg-purple-600 hover:bg-purple-500 px-5 py-1.5 rounded-full font-orbitron text-[10px] uppercase font-bold text-white shadow-lg transition-all active:scale-95">
            Connect Wallet
        </button>
    </nav>

    <div class="evolution-container">
        <div class="evolution-badge">
            <p class="text-[7px] font-orbitron text-purple-300 uppercase tracking-[0.3em]">Gorilla Rank</p>
            <p id="live-rank" class="text-[12px] font-orbitron font-bold uppercase italic text-white">Baby Ape</p>
        </div>
    </div>

    <main id="game-viewport">
        <div class="score-display">
            <p class="text-[8px] font-orbitron text-yellow-500 uppercase">Collected</p>
            <p class="text-xl font-orbitron font-bold text-white leading-none">🍌 <span id="score-val">0</span></p>
        </div>

        <div id="gorilla"><img src="G.PNG"></div>

        <div id="game-over">
            <h2 class="font-orbitron text-4xl font-bold text-red-500 mb-2 italic uppercase">Busted!</h2>
            <p id="final-rank" class="font-orbitron text-xl text-yellow-400 mb-10 uppercase tracking-widest"></p>
            <button onclick="initGame()" class="bg-purple-600 px-12 py-4 rounded-full font-orbitron text-xs font-bold text-white shadow-2xl active:scale-90 transition-all">
                TRY AGAIN
            </button>
        </div>
    </main>

    <script>
        let score = 0, isGameOver = false, speed = 4.5;
        const viewport = document.getElementById('game-viewport');
        const gorilla = document.getElementById('gorilla');
        let gameLoop, spawnLoop;

        function initGame() {
            score = 0; isGameOver = false; speed = 4.5;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('live-rank').innerText = "Baby Ape";
            document.getElementById('live-rank').style.color = "#fff";
            
            // Bersihkan pisang lama
            document.querySelectorAll('.banana').forEach(b => b.remove());
            
            clearInterval(gameLoop); clearInterval(spawnLoop);
            gameLoop = setInterval(update, 20);
            spawnLoop = setInterval(createBanana, 1000);
        }

        function createBanana() {
            if(isGameOver) return;
            const b = document.createElement('div');
            b.className = 'banana';
            b.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/3143/3143641.png">`;
            const maxX = viewport.offsetWidth - 50; // Supaya tidak muncul di luar kotak
            b.style.left = Math.floor(Math.random() * maxX) + 'px';
            b.style.top = '-60px';
            viewport.appendChild(b);
        }

        function update() {
            if(isGameOver) return;
            const bananas = document.querySelectorAll('.banana');
            
            bananas.forEach(b => {
                let top = parseInt(b.style.top);
                b.style.top = (top + speed) + 'px';

                // Cek Tabrakan
                if(checkCollision(gorilla, b)) {
                    score++;
                    document.getElementById('score-val').innerText = score;
                    updateRank(score);
                    b.remove();
                }

                // Jika pisang lolos sampai bawah
                if(top > viewport.offsetHeight) {
                    gameOver();
                }
            });
        }

        function updateRank(s) {
            const rank = document.getElementById('live-rank');
            if(s >= 100) { 
                rank.innerText = "Golden Kong 🏆"; 
                rank.style.color = "#facc15"; 
            } else if(s >= 50) { 
                rank.innerText = "Silverback 🥈"; 
                rank.style.color = "#e2e8f0"; 
            }
            // Tambah kecepatan sedikit demi sedikit
            if(s % 10 === 0 && s > 0) speed += 0.3;
        }

        function checkCollision(a, b) {
            const r1 = a.getBoundingClientRect();
            const r2 = b.getBoundingClientRect();
            return !(r1.right < r2.left + 10 || r1.left > r2.right - 10 || r1.bottom < r2.top + 10 || r1.top > r2.bottom - 10);
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop); clearInterval(spawnLoop);
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-rank').innerText = document.getElementById('live-rank').innerText;
        }

        // --- SISTEM SLIDE POJOK KE POJOK (FIXED) ---
        const moveHandler = (e) => {
            if(isGameOver) return;
            const rect = viewport.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const touchX = clientX - rect.left;
            
            // Hitungan posisi monyet
            let newX = touchX - (gorilla.offsetWidth / 2);

            // Batas Kiri (0) dan Kanan (Lebar Viewport - Lebar Gorilla)
            const minX = 0;
            const maxX = viewport.offsetWidth - gorilla.offsetWidth;

            if (newX < minX) newX = minX;
            if (newX > maxX) newX = maxX;

            gorilla.style.left = newX + 'px';
            gorilla.style.transform = 'none'; // Matikan transform CSS supaya tidak stuck
            if(e.cancelable) e.preventDefault();
        };

        viewport.addEventListener('touchmove', moveHandler, {passive: false});
        viewport.addEventListener('mousemove', moveHandler);

    </script>
</body>
</html>
