<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEGsol | Fortify Every Gorilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0a0a0b; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-morphism { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; }
        .hero-gradient { background: radial-gradient(circle at center, #2e1065 0%, #0a0a0b 80%); }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .btn-primary { background: linear-gradient(90deg, #7c3aed, #9333ea); transition: all 0.3s ease; }
        .ape-glow { filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.5)); border: 2px solid rgba(168, 85, 247, 0.3); }
        .swap-input-bg { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(124, 58, 237, 0.2); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0b; }
        ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="fixed w-full z-[60] px-4 py-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-morphism px-6 py-4 border-2 border-purple-500/20 bg-[#0a0a0b]/80">
            <div class="flex items-center space-x-4">
                <img src="G.PNG" alt="Logo" class="w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-purple-500/50">
                <a href="#" class="font-orbitron text-xl md:text-2xl font-bold tracking-tighter uppercase">FEG<span class="text-purple-500">SOL</span></a>
            </div>
            <button class="p-1 rounded-2xl border-2 border-purple-500/30 bg-[#0a0a0b]"><img src="solana.JPG" class="w-10 h-10 rounded-xl object-cover"></button>
        </div>
    </nav>

    <section class="relative min-h-screen flex flex-col items-center justify-center pt-28 hero-gradient text-center px-6">
        <div class="relative mb-8 mt-4">
            <div class="absolute inset-0 bg-purple-600/20 blur-3xl rounded-full"></div>
            <img src="G.PNG" class="relative w-44 h-44 md:w-60 md:h-60 rounded-full object-cover ape-glow">
        </div>
        <h1 class="text-4xl md:text-7xl font-orbitron font-bold leading-none mb-4 tracking-tight">WE BUILD <br> <span class="gold-text">THE FUTURE</span></h1>
        
        <div class="mb-10 w-full max-w-lg mx-auto">
            <p class="font-orbitron text-[10px] tracking-[0.4em] uppercase text-purple-400 mb-4">Launching In:</p>
            <div class="grid grid-cols-4 gap-2 md:gap-4">
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-yellow-500 text-center"><span id="days" class="block text-2xl md:text-4xl font-bold font-orbitron gold-text">00</span><span class="text-[8px] uppercase text-gray-500">Days</span></div>
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-purple-500 text-center"><span id="hours" class="block text-2xl md:text-4xl font-bold font-orbitron text-white">00</span><span class="text-[8px] uppercase text-gray-400">Hours</span></div>
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-blue-500 text-center"><span id="minutes" class="block text-2xl md:text-4xl font-bold font-orbitron text-white">00</span><span class="text-[8px] uppercase text-gray-400">Mins</span></div>
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-pink-500 text-center"><span id="seconds" class="block text-2xl md:text-4xl font-bold font-orbitron text-white animate-pulse">00</span><span class="text-[8px] uppercase text-gray-400">Secs</span></div>
            </div>
        </div>

        <div class="flex flex-col gap-3 w-full max-w-xs mb-8">
            <a href="#swap-section" class="btn-primary py-3 rounded-xl font-orbitron text-xs font-bold tracking-widest uppercase text-center text-white">Get $FEGSOL</a>
            <button onclick="copyCA()" class="bg-white/5 border border-white/10 py-3 rounded-xl font-orbitron text-xs font-bold tracking-widest uppercase text-white hover:bg-white/10">
                <span id="ca-text">Copy Contract Address</span> <i class="fas fa-copy ml-2"></i>
            </button>
        </div>
    </section>

    <section id="swap-section" class="py-20 px-6">
        <div class="max-w-md mx-auto relative z-10">
            <div class="text-center mb-8"><h2 class="font-orbitron text-2xl font-bold gold-text uppercase">FEGswap Interface</h2></div>
            <div class="glass-morphism p-6 border-2 border-purple-500/30">
                <div class="swap-input-bg rounded-2xl p-4 mb-2">
                    <span class="text-[10px] font-orbitron text-gray-500 uppercase">You Pay SOL</span>
                    <div class="flex items-center gap-3">
                        <input type="number" id="inputAmount" placeholder="0.0" class="bg-transparent text-2xl font-bold w-full outline-none text-white font-orbitron" oninput="calculateSwap()">
                        <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-xl border border-white/10"><img src="solana.JPG" class="w-5 h-5 rounded-full"> <span class="font-bold text-sm font-orbitron">SOL</span></div>
                    </div>
                </div>
                <div class="flex justify-center -my-4 relative z-20"><button class="bg-[#1a1a1e] border-2 border-purple-500/30 w-10 h-10 rounded-xl flex items-center justify-center transition-all hover:rotate-180"><i class="fas fa-arrow-down text-purple-400"></i></button></div>
                <div class="swap-input-bg rounded-2xl p-4 mt-2">
                    <span class="text-[10px] font-orbitron text-gray-500 uppercase">You Receive FEGsol</span>
                    <div class="flex items-center gap-3">
                        <input type="text" id="outputAmount" placeholder="0.0" class="bg-transparent text-2xl font-bold w-full outline-none text-white font-orbitron" readonly>
                        <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-xl border border-white/10"><img src="G.PNG" class="w-5 h-5 rounded-full"> <span class="font-bold text-sm font-orbitron uppercase">FEGSOL</span></div>
                    </div>
                </div>
                <button id="mainSwapBtn" onclick="handleSwapAction()" class="w-full mt-6 btn-primary py-4 rounded-2xl font-orbitron text-sm font-bold tracking-[0.2em] uppercase">Connect Wallet</button>
                <p class="text-[8px] text-center text-gray-600 mt-4 font-orbitron uppercase tracking-widest">Powered by Jupiter v6 API</p>
            </div>
        </div>
    </section>

    <section class="py-12 px-6 max-w-6xl mx-auto">
        <h2 class="font-orbitron text-2xl font-bold text-center mb-8 gold-text uppercase">Live Market Chart</h2>
        <div class="glass-morphism p-2 md:p-4 border-2 border-purple-500/30">
            <iframe id="dex-iframe" src="" style="width:100%; height:600px; border:none; border-radius:10px;" allow="clipboard-write"></iframe>
        </div>
    </section>

    <section id="tokenomics" class="py-20 px-6 max-w-4xl mx-auto border-t border-white/5">
        <h2 class="font-orbitron text-3xl font-bold text-center mb-12 gold-text uppercase">Tokenomics</h2>
        <div class="glass-morphism p-8 space-y-8">
            <div class="flex justify-between items-center border-b border-white/5 pb-6">
                <span class="text-gray-400 font-orbitron text-xs uppercase tracking-widest">Total Supply</span>
                <span class="text-xl md:text-3xl font-bold font-orbitron text-white">1,000,000,000</span>
            </div>
            <div class="flex justify-between items-center border-b border-white/5 pb-6">
                <span class="text-gray-400 font-orbitron text-xs uppercase tracking-widest">Fair Launch</span>
                <span class="text-white font-bold font-orbitron uppercase">PUMP.FUN</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-400 font-orbitron text-xs uppercase tracking-widest">Liquidity</span>
                <span class="text-green-400 font-bold font-orbitron uppercase">100% BURNED</span>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center border-t border-white/5 bg-[#080809]">
        <div class="flex justify-center space-x-8 mb-8">
            <a href="https://x.com/fegirvansy?s=21" class="text-gray-400 hover:text-purple-500 text-3xl"><i class="fab fa-twitter"></i></a>
            <a href="https://t.me/+16oraMVw88w3MmU9" class="text-gray-400 hover:text-blue-400 text-3xl"><i class="fab fa-telegram"></i></a>
        </div>
        <p class="text-[10px] text-gray-600 font-orbitron uppercase tracking-[0.2em]">FEGSOL &copy; 2026</p>
    </footer>

    <script>
        const CA_KITA = "DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263";
        const SOL_CA = "So11111111111111111111111111111111111111112";
        let isWalletConnected = false;

        async function calculateSwap() {
            const input = document.getElementById('inputAmount').value;
            const outputField = document.getElementById('outputAmount');
            if (!input || input <= 0) { outputField.value = "0.0"; return; }
            try {
                const lamports = Math.floor(input * 1000000000);
                const response = await fetch(`https://quote-api.jup.ag/v6/quote?inputMint=${SOL_CA}&outputMint=${CA_KITA}&amount=${lamports}&slippageBps=50`);
                const data = await response.json();
                if (data.outAmount) {
                    outputField.value = (data.outAmount / 1000000000).toLocaleString(undefined, {maximumFractionDigits: 2});
                    if(isWalletConnected) document.getElementById('mainSwapBtn').innerText = "Swap Now";
                }
            } catch (err) { outputField.value = "Estimating..."; }
        }

        function handleSwapAction() {
            const btn = document.getElementById('mainSwapBtn');
            const amt = document.getElementById('inputAmount').value;
            if (!isWalletConnected) {
                isWalletConnected = true;
                btn.innerText = amt > 0 ? "Swap Now" : "Enter Amount";
                btn.classList.add('bg-green-600');
                alert("Wallet Connected!");
                return;
            }
            if (amt > 0) { window.open(`https://jup.ag/swap/SOL-${CA_KITA}?inputAmount=${amt}`, '_blank'); }
            else { alert("Please enter amount"); }
        }

        function copyCA() {
            navigator.clipboard.writeText(CA_KITA).then(() => {
                const text = document.getElementById('ca-text');
                text.innerText = "CA Copied!";
                setTimeout(() => text.innerText = "Copy Contract Address", 2000);
            });
        }

        // Initialize Charts & Timer
        document.getElementById('dex-iframe').src = `https://dexscreener.com/solana/${CA_KITA}?embed=1&theme=dark&trades=0&info=0`;
        const countdownDate = new Date("April 23, 2026 20:00:00").getTime();
        setInterval(function() {
            const distance = countdownDate - new Date().getTime();
            if(distance > 0) {
                document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById("hours").innerHTML = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById("minutes").innerHTML = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById("seconds").innerHTML = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
            }
        }, 1000);
    </script>
</body>
</html>
