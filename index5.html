<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEGsol | Fortify Every Gorilla</title>

    <meta name="title" content="FEGsol | Fortify Every Gorilla">
    <meta name="description" content="FEGsol is the ultimate architecture on Solana, built to Fortify Every Gorilla. Join the strongest tribe today.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body {
            background-color: #0a0a0b;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .hero-gradient {
            background: radial-gradient(circle at center, #2e1065 0%, #0a0a0b 80%);
        }

        .gold-text {
            background: linear-gradient(to right, #fde047, #ca8a04);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .btn-primary {
            background: linear-gradient(90deg, #7c3aed, #9333ea);
            transition: all 0.3s ease;
        }

        .ape-glow {
            filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.5));
            border: 2px solid rgba(168, 85, 247, 0.3);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0b; }
        ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[60] px-4 py-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-morphism px-6 py-4 border-2 border-purple-500/20 bg-[#0a0a0b]/80">
            <div class="flex items-center space-x-4">
                <img src="G.PNG" alt="Logo" class="w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-purple-500/50">
                <a href="index.html" class="font-orbitron text-xl md:text-2xl font-bold tracking-tighter uppercase">
                    FEG<span class="text-purple-500">SOL</span>
                </a>
            </div>
            <button id="mobile-menu-button" class="p-1 rounded-2xl border-2 border-purple-500/30 bg-[#0a0a0b]">
                <img src="solana.JPG" alt="Solana" class="w-10 h-10 md:w-12 md:h-12 rounded-xl">
            </button>
        </div>
    </nav>

    <section id="about" class="relative min-h-screen flex flex-col items-center justify-center pt-28 hero-gradient text-center px-6">
        <div class="relative mb-8 mt-4">
            <img src="G.PNG" alt="FEGsol Gorilla" class="relative w-44 h-44 md:w-60 md:h-60 rounded-full object-cover ape-glow">
        </div>

        <h1 class="text-4xl md:text-7xl font-orbitron font-bold leading-none mb-4 tracking-tight">
            WE BUILD <br> 
            <span class="gold-text">THE FUTURE</span>
        </h1>

        <div class="mb-10 w-full max-w-lg mx-auto">
            <div class="grid grid-cols-4 gap-2 md:gap-4">
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-yellow-500">
                    <span id="days" class="block text-2xl md:text-4xl font-bold font-orbitron gold-text">00</span>
                    <span class="text-[8px] uppercase text-gray-500">Days</span>
                </div>
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-purple-500">
                    <span id="hours" class="block text-2xl md:text-4xl font-bold font-orbitron text-white">00</span>
                    <span class="text-[8px] uppercase text-gray-400">Hours</span>
                </div>
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-blue-500">
                    <span id="minutes" class="block text-2xl md:text-4xl font-bold font-orbitron text-white">00</span>
                    <span class="text-[8px] uppercase text-gray-400">Mins</span>
                </div>
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-pink-500">
                    <span id="seconds" class="block text-2xl md:text-4xl font-bold font-orbitron text-white animate-pulse">00</span>
                    <span class="text-[8px] uppercase text-gray-400">Secs</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-3 w-full max-w-xs">
            <button onclick="copyCA()" class="bg-white/5 border border-white/10 py-3 rounded-xl font-orbitron text-xs font-bold text-white">
                <span id="ca-text">Copy Contract Address</span>
            </button>
        </div>
    </section>

    <section id="swap-section" class="py-20 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="font-orbitron text-2xl font-bold mb-8 gold-text uppercase tracking-widest">Swap on Raydium</h2>
            <div class="glass-morphism overflow-hidden border-2 border-purple-500/30 bg-[#121214] shadow-2xl">
                <iframe 
                    src="https://raydium.io/swap/?inputMint=sol&outputMint=BBigCqRMg57zqgBQMvccvFok2Kt24uwnid47w4rWpump" 
                    width="100%" 
                    height="600" 
                    style="border: none; border-radius: 15px;"
                    title="Raydium Swap">
                </iframe>
            </div>
        </div>
    </section>

    <section class="py-16 px-6 max-w-4xl mx-auto border-t border-white/5">
        <div class="glass-morphism p-8 border-2 border-purple-500/30 bg-purple-900/5">
            <h2 class="font-orbitron text-xl font-bold text-white mb-4">STAKING POWERED BY STREAMFLOW</h2>
            <p class="text-gray-400 text-sm mb-6">Institutional-grade security for $FEGSOL holders.</p>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/5 p-4 rounded-xl border border-white/10 text-center">
                    <p class="text-[10px] text-white font-bold font-orbitron">REAL-TIME YIELD</p>
                </div>
                <div class="bg-white/5 p-4 rounded-xl border border-white/10 text-center">
                    <p class="text-[10px] text-white font-bold font-orbitron">AUDITED CONTRACTS</p>
                </div>
            </div>
        </div>
    </section>

    <section id="tokenomics" class="py-20 px-6 max-w-4xl mx-auto border-t border-white/5">
        <h2 class="font-orbitron text-3xl font-bold text-center mb-12 gold-text uppercase">Tokenomics</h2>
        <div class="glass-morphism p-8 space-y-6">
            <div class="flex justify-between items-center border-b border-white/5 pb-4">
                <span class="text-gray-400 font-orbitron text-xs uppercase">Total Supply</span>
                <span class="text-xl font-bold font-orbitron">1,000,000,000</span>
            </div>
            <div class="flex justify-between items-center border-b border-white/5 pb-4">
                <span class="text-gray-400 font-orbitron text-xs uppercase">Liquidity</span>
                <span class="text-xl font-bold font-orbitron text-purple-500">BURNED</span>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-10">
            <button onclick="revealWallet('marketing-addr')" class="glass-morphism p-4 border border-white/5">
                <div class="font-orbitron text-[9px] text-blue-400 uppercase">Marketing</div>
                <div id="marketing-addr" class="hidden mt-3 text-[8px] break-all font-mono">D2B49ZRfQCiVXFCocXj5mh5M2pLYZmozcqEia7wXMmVt</div>
            </button>
            <button onclick="revealWallet('burn-addr')" class="glass-morphism p-4 border border-white/5">
                <div class="font-orbitron text-[9px] text-red-400 uppercase">Burn Queue</div>
                <div id="burn-addr" class="hidden mt-3 text-[8px] break-all font-mono">92HeH8d3g3UfwsUYwA3w7idmj5XzQFngmtQ6fibqky3T</div>
            </button>
            <button onclick="revealWallet('dev-addr')" class="glass-morphism p-4 border border-white/5">
                <div class="font-orbitron text-[9px] text-purple-400 uppercase">Developer</div>
                <div id="dev-addr" class="hidden mt-3 text-[8px] break-all font-mono">DiuZaggy69F6mkx9Z5ckZX3msuxedK6URk3mux5XnL93</div>
            </button>
            <button onclick="revealWallet('staking-addr')" class="glass-morphism p-4 border border-white/5">
                <div class="font-orbitron text-[9px] text-yellow-400 uppercase">Banana Farm</div>
                <div id="staking-addr" class="hidden mt-3 text-[8px] break-all font-mono">Hu1atW9tL8THFWBWvayjoMLrpLaGrfb7XssJh4o5XFta</div>
            </button>
        </div>
    </section>

    <footer class="py-12 text-center border-t border-white/5">
        <div class="flex justify-center space-x-8 mb-6">
            <a href="#" class="text-gray-400 hover:text-purple-500 text-2xl"><i class="fab fa-twitter"></i></a>
            <a href="#" class="text-gray-400 hover:text-blue-400 text-2xl"><i class="fab fa-telegram"></i></a>
        </div>
        <p class="text-[10px] text-gray-600 font-orbitron">FEGSOL &copy; 2026</p>
    </footer>

    <script>
    const CA_KITA = "BBigCqRMg57zqgBQMvccvFok2Kt24uwnid47w4rWpump";

    function copyCA() {
        navigator.clipboard.writeText(CA_KITA).then(() => {
            const btnText = document.getElementById('ca-text');
            btnText.innerText = "CA Copied!";
            setTimeout(() => { btnText.innerText = "Copy Contract Address"; }, 2000);
        });
    }

    function revealWallet(id) {
        const el = document.getElementById(id);
        el.classList.toggle('hidden');
    }

    const countdownDate = new Date("April 23, 2026 20:00:00").getTime();
    setInterval(function() {
        const now = new Date().getTime();
        const distance = countdownDate - now;
        document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
        document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
    }, 1000);
    </script>
</body>
</html>
