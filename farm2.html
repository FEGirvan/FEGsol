<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEG SOL | Banana Farm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0a0a0b; color: #ffffff; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-morphism { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tier-btn.active { background: rgba(124, 58, 237, 0.3) !important; border-color: #7c3aed !important; color: white; }
    </style>
</head>

<body class="bg-[#0a0a0b] min-h-screen">
    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <img src="G.PNG" class="w-8 h-8 rounded-full border border-purple-500">
                <span class="font-orbitron text-lg font-bold">FEG<span class="text-purple-500">SOL</span></span>
            </div>
            <button id="connect-btn" onclick="connect()" class="bg-purple-600 px-5 py-2 rounded-full font-orbitron text-[10px] text-white uppercase transition-all active:scale-95 shadow-lg">
                Connect Wallet
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 pt-5">
        <div class="text-center mb-8">
            <h1 class="font-orbitron text-4xl font-bold gold-text uppercase italic">Banana Farm</h1>
            <p class="text-purple-400 font-orbitron text-[9px] tracking-[0.2em] mt-2 italic">Official FEG SOL Staking</p>
        </div>

        <div class="glass-morphism p-6 mb-6 border-t border-purple-500/20">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-[9px] text-gray-500 font-orbitron uppercase">Total Rewards</p>
                    <p class="text-2xl font-bold text-yellow-500 font-orbitron">0.00</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-gray-500 font-orbitron uppercase">APR Pool</p>
                    <p id="display-apr" class="text-2xl font-bold text-green-400 font-orbitron">40%</p>
                </div>
            </div>

            <div class="space-y-5">
                <div>
                    <p class="text-[9px] text-gray-500 font-orbitron uppercase mb-3">1. Select Duration</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="changeTier(3, 0.4, this)" class="tier-btn active glass-morphism py-3 text-[10px] font-orbitron text-gray-300">3 DAYS</button>
                        <button onclick="changeTier(7, 0.8, this)" class="tier-btn glass-morphism py-3 text-[10px] font-orbitron text-gray-300">7 DAYS</button>
                        <button onclick="changeTier(30, 1.6, this)" class="tier-btn glass-morphism py-3 text-[10px] font-orbitron text-gray-300">30 DAYS</button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between text-[9px] font-orbitron uppercase mb-2">
                        <span class="text-gray-500">2. Stake Amount</span>
                        <span id="balance-text" class="text-purple-400 font-bold tracking-tighter">Balance: Fetching...</span>
                    </div>
                    <div class="relative">
                        <input type="number" id="stake-input" placeholder="0.0" class="w-full bg-black/50 border border-purple-500/20 rounded-xl px-4 py-4 font-orbitron text-white outline-none focus:border-purple-500 transition-all">
                        <button onclick="setMax()" class="absolute right-4 top-4 text-[10px] font-orbitron text-purple-400 font-bold">MAX</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="openPool()" class="bg-green-600/10 border border-green-500/30 text-green-400 py-3 rounded-xl font-orbitron text-[10px] uppercase font-bold">Harvest</button>
                    <button onclick="openPool()" class="bg-blue-600/10 border border-blue-500/30 text-blue-400 py-3 rounded-xl font-orbitron text-[10px] uppercase font-bold">Compound</button>
                </div>
                <button onclick="openPool()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl font-orbitron font-bold text-white shadow-xl uppercase tracking-[0.2em] mt-2 active:scale-95 transition-all">Stake Now</button>
            </div>
        </div>
    </main>

    <script>
        const MINT_ADDRESS = "49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump";
        const POOL_URL = "https://app.streamflow.finance/contract/solana/mainnet/BHT2A2SN6zPKJr5xDejaKx9LN3F8E8f5WSmnehARFg9z";
        
        // Gunakan RPC yang paling bandel (Helius atau Public)
        const RPC_ENDPOINTS = [
            "https://api.mainnet-beta.solana.com",
            "https://solana-mainnet.rpc.extrnode.com",
            "https://rpc.ankr.com/solana"
        ];

        let walletAddress = null;
        let userBalance = 0;

        // Fungsi Ambil Saldo yang Lebih Galak
        async function getSolanaBalance(addr) {
            const conn = new solanaWeb3.Connection(RPC_ENDPOINTS[0], "confirmed");
            try {
                const pubKey = new solanaWeb3.PublicKey(addr);
                const mint = new solanaWeb3.PublicKey(MINT_ADDRESS);
                
                // Teknik: GetTokenAccountsByOwner
                const response = await conn.getParsedTokenAccountsByOwner(pubKey, { mint: mint });
                
                if (response.value.length > 0) {
                    const amount = response.value[0].account.data.parsed.info.tokenAmount.uiAmount;
                    userBalance = amount || 0;
                } else {
                    userBalance = 0;
                }

                document.getElementById('balance-text').innerText = `Balance: ${userBalance.toLocaleString()} $FEGSOL`;
                document.getElementById('balance-text').classList.replace('text-purple-400', 'text-green-400');
            } catch (err) {
                console.error("Gagal tarik saldo:", err);
                document.getElementById('balance-text').innerText = "Balance: 0 $FEGSOL";
            }
        }

        // Fungsi Koneksi
        async function connect() {
            try {
                // Cek apakah Phantom ada
                const isPhantomInstalled = window.solana && window.solana.isPhantom;
                
                if (isPhantomInstalled) {
                    const resp = await window.solana.connect();
                    walletAddress = resp.publicKey.toString();
                    
                    // Update Tombol
                    const btn = document.getElementById('connect-btn');
                    btn.innerText = walletAddress.substring(0,4) + "..." + walletAddress.substring(walletAddress.length-4);
                    btn.classList.replace('bg-purple-600', 'bg-green-600');
                    
                    // Tarik saldo dengan delay dikit
                    setTimeout(() => getSolanaBalance(walletAddress), 500);

                    Swal.fire({ title: 'Success', text: 'Wallet Connected', icon: 'success', timer: 1500, showConfirmButton: false, background: '#111', color: '#fff' });
                } else {
                    window.open("https://phantom.app/", "_blank");
                }
            } catch (err) {
                console.warn("User ditched connect");
            }
        }

        function setMax() {
            if (!walletAddress) return connect();
            document.getElementById('stake-input').value = userBalance;
        }

        function changeTier(days, apr, el) {
            document.getElementById('display-apr').innerText = (apr * 100) + '%';
            document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function openPool() {
            if (!walletAddress) return connect();
            window.open(POOL_URL, '_blank');
        }

        // Auto-refresh saldo setiap 15 detik
        setInterval(() => { if(walletAddress) getSolanaBalance(walletAddress); }, 15000);

        // Reset text kalau belum connect
        window.onload = () => {
            document.getElementById('balance-text').innerText = "Balance: 0 $FEGSOL";
        }
    </script>
</body>
</html>
