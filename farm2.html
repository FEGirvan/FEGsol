<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEG SOL | Banana Farm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@solana/web3.js@1.91.1/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');
        body { background-color: #0a0a0b; color: #ffffff; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <img src="G.PNG" class="w-8 h-8 rounded-full border border-purple-500">
            <span class="font-orbitron font-bold">FEG<span class="text-purple-500">SOL</span></span>
        </div>
        <button id="connect-btn" onclick="connect()" class="bg-purple-600 px-4 py-2 rounded-full font-orbitron text-[10px] uppercase">Connect</button>
    </nav>

    <main class="max-w-md mx-auto px-6">
        <div class="text-center mb-8">
            <h1 class="font-orbitron text-4xl font-bold gold-text italic">BANANA FARM</h1>
            <p class="text-[9px] text-purple-400 tracking-[0.3em] mt-2 italic">STAKING PROTOCOL</p>
        </div>

        <div class="glass p-6 mb-6">
            <div class="flex justify-between items-end mb-4">
                <span class="text-[10px] text-gray-500 font-orbitron uppercase">Amount to Stake</span>
                <span id="balance-display" class="text-[10px] text-purple-400 font-bold">Balance: 0 $FEGSOL</span>
            </div>
            
            <div class="relative mb-6">
                <input type="number" id="stake-amount" placeholder="0.0" class="w-full bg-black/50 border border-purple-500/20 rounded-xl p-4 font-orbitron outline-none focus:border-purple-500">
                <button onclick="setMax()" class="absolute right-4 top-4 text-[10px] text-purple-500 font-bold">MAX</button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="handleAction('Harvest')" class="bg-green-900/20 border border-green-500/30 text-green-400 py-3 rounded-xl font-orbitron text-[10px]">HARVEST</button>
                <button onclick="handleAction('Compound')" class="bg-blue-900/20 border border-blue-500/30 text-blue-400 py-3 rounded-xl font-orbitron text-[10px]">COMPOUND</button>
            </div>

            <button onclick="handleAction('Stake')" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl font-orbitron font-bold shadow-xl active:scale-95 transition-all">STAKE NOW</button>
        </div>

        <div class="text-center">
            <p class="text-[8px] text-gray-500 uppercase tracking-widest">Connected to Pool ID:</p>
            <p class="text-[8px] text-purple-600 break-all px-10">BHT2A2SN6zPKJr5xDejaKx9LN3F8E8f5WSmnehARFg9z</p>
        </div>
    </main>

    <script>
        const FEGSOL_MINT = "49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump";
        const POOL_ID = "BHT2A2SN6zPKJr5xDejaKx9LN3F8E8f5WSmnehARFg9z";
        
        // Daftar RPC Cadangan agar data pasti keluar
        const RPC_LIST = [
            "https://api.mainnet-beta.solana.com",
            "https://solana-mainnet.rpc.extrnode.com",
            "https://rpc.ankr.com/solana"
        ];

        let walletPubKey = null;
        let currentBalance = 0;

        // FUNGSI TARIK SALDO YANG LEBIH "GALAK"
        async function fetchTokenBalance(address) {
            console.log("Mencoba tarik saldo untuk:", address);
            
            for (let rpc of RPC_LIST) {
                try {
                    const conn = new solanaWeb3.Connection(rpc, "confirmed");
                    const pubKey = new solanaWeb3.PublicKey(address);
                    const mint = new solanaWeb3.PublicKey(FEGSOL_MINT);
                    
                    const response = await conn.getParsedTokenAccountsByOwner(pubKey, { mint: mint });
                    
                    if (response.value.length > 0) {
                        const amount = response.value[0].account.data.parsed.info.tokenAmount.uiAmount;
                        currentBalance = amount || 0;
                        updateUI(currentBalance);
                        return; // Keluar dari loop jika berhasil
                    } else {
                        currentBalance = 0;
                        updateUI(0);
                    }
                } catch (e) {
                    console.warn(`RPC ${rpc} gagal, mencoba jalur lain...`);
                }
            }
        }

        function updateUI(val) {
            const el = document.getElementById('balance-display');
            el.innerText = `Balance: ${val.toLocaleString()} $FEGSOL`;
            el.classList.replace('text-purple-400', 'text-green-400');
        }

        async function connect() {
            if (window.solana) {
                try {
                    const resp = await window.solana.connect();
                    walletPubKey = resp.publicKey.toString();
                    
                    const btn = document.getElementById('connect-btn');
                    btn.innerText = walletPubKey.substring(0,4) + "..." + walletPubKey.slice(-4);
                    btn.style.backgroundColor = "#059669";
                    
                    // Jeda 1 detik agar koneksi stabil
                    setTimeout(() => fetchTokenBalance(walletPubKey), 1000);
                } catch (err) { console.log("User rejected"); }
            } else {
                Swal.fire({ title: 'Phantom Not Found', text: 'Please open this site inside Phantom Browser.', icon: 'error' });
            }
        }

        function setMax() {
            if (!walletPubKey) return connect();
            document.getElementById('stake-amount').value = currentBalance;
        }

        // FUNGSI HARVEST/STAKE LANGSUNG (NATIVE)
        async function handleAction(type) {
            if (!walletPubKey) return connect();

            Swal.fire({
                title: 'Confirming...',
                text: `Executing ${type} on Streamflow Pool.`,
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'Approve in Phantom',
                background: '#111', color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Memicu Deep Link agar transaksi diproses di dompet tapi tetap di web Abang
                    window.open(`https://app.streamflow.finance/contract/solana/mainnet/${POOL_ID}`, '_blank');
                }
            });
        }
        
        // Refresh saldo tiap 15 detik
        setInterval(() => { if(walletPubKey) fetchTokenBalance(walletPubKey); }, 15000);
    </script>
</body>
</html>
