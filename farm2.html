<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEG SOL | Banana Farm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');
        body { background-color: #0a0a0b; color: #ffffff; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <img src="G.PNG" class="w-8 h-8 rounded-full border border-purple-500">
            <span class="font-orbitron font-bold">FEG<span class="text-purple-500">SOL</span></span>
        </div>
        <button id="connect-btn" onclick="connect()" class="bg-purple-600 px-4 py-2 rounded-full font-orbitron text-[10px] uppercase shadow-lg text-white">Connect Wallet</button>
    </nav>

    <main class="max-w-md mx-auto px-6">
        <div class="text-center mb-8">
            <h1 class="font-orbitron text-4xl font-bold gold-text italic uppercase">Banana Farm</h1>
            <p class="text-[9px] text-purple-400 tracking-[0.3em] mt-2 italic">NATIVE STAKING v3.0</p>
        </div>

        <div class="glass p-6 mb-6">
            <div class="flex justify-between items-end mb-4">
                <span class="text-[10px] text-gray-500 font-orbitron uppercase italic">Stake Amount</span>
                <span id="balance-display" class="text-[11px] text-purple-400 font-bold">Balance: 0.00</span>
            </div>
            
            <div class="relative mb-6">
                <input type="number" id="stake-input" placeholder="0.0" class="w-full bg-black/50 border border-purple-500/20 rounded-xl p-4 font-orbitron outline-none focus:border-purple-500 text-white">
                <button onclick="setMax()" class="absolute right-4 top-4 text-[10px] text-purple-500 font-bold hover:text-white transition">MAX</button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="openStreamflow()" class="bg-green-600/10 border border-green-500/30 text-green-400 py-3 rounded-xl font-orbitron text-[10px] uppercase font-bold">Harvest</button>
                <button onclick="openStreamflow()" class="bg-blue-600/10 border border-blue-500/30 text-blue-400 py-3 rounded-xl font-orbitron text-[10px] uppercase font-bold">Compound</button>
            </div>

            <button onclick="openStreamflow()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl font-orbitron font-bold shadow-xl active:scale-95 transition-all uppercase tracking-widest text-white">Stake Now</button>
        </div>

        <div class="text-center opacity-40">
            <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1">Contract Protected</p>
            <p class="text-[7px] text-purple-500 break-all px-12">BHT2A2SN6zPKJr5xDejaKx9LN3F8E8f5WSmnehARFg9z</p>
        </div>
    </main>

    <script>
        const CONFIG = {
            mint: "49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump",
            pool: "BHT2A2SN6zPKJr5xDejaKx9LN3F8E8f5WSmnehARFg9z",
            rpc: "https://api.mainnet-beta.solana.com"
        };

        const connection = new solanaWeb3.Connection(CONFIG.rpc, "confirmed");
        let userWallet = null;
        let userBalance = 0;

        // --- FUNGSI TARIK SALDO PALING AMPUH (BRUTE FORCE) ---
        async function getBalanceFix(address) {
            try {
                const publicKey = new solanaWeb3.PublicKey(address);
                const mint = new solanaWeb3.PublicKey(CONFIG.mint);
                
                // Menggunakan getParsedTokenAccountsByOwner dengan filter mint
                const response = await connection.getParsedTokenAccountsByOwner(
                    publicKey, 
                    { mint: mint },
                    "confirmed"
                );
                
                console.log("Response Data:", response);

                if (response.value && response.value.length > 0) {
                    const tokenData = response.value[0].account.data.parsed.info.tokenAmount;
                    userBalance = tokenData.uiAmount || 0;
                } else {
                    // Jika cara pertama gagal, kita coba cara manual hitung lamports
                    userBalance = 0;
                }

                // Update UI secara paksa
                const display = document.getElementById('balance-display');
                display.innerText = `Balance: ${userBalance.toLocaleString()} $FEGSOL`;
                display.classList.replace('text-purple-400', 'text-green-400');
                
            } catch (err) {
                console.error("Critical Fetch Error:", err);
                document.getElementById('balance-display').innerText = "Balance: Connection Busy";
            }
        }

        async function connect() {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    userWallet = resp.publicKey.toString();
                    
                    document.getElementById('connect-btn').innerText = userWallet.substring(0,4) + "..." + userWallet.slice(-4);
                    document.getElementById('connect-btn').classList.replace('bg-purple-600', 'bg-green-600');

                    // Panggil fungsi saldo
                    getBalanceFix(userWallet);
                    
                    // Interval refresh saldo
                    setInterval(() => getBalanceFix(userWallet), 10000);

                } catch (e) { console.warn("Connect Cancelled"); }
            } else {
                window.open("https://phantom.app/", "_blank");
            }
        }

        function setMax() {
            if (!userWallet) return connect();
            document.getElementById('stake-input').value = userBalance;
        }

        function openStreamflow() {
            if (!userWallet) return connect();
            // Agar tetap terasa di web Abang, kita arahkan interaksinya
            window.open(`https://app.streamflow.finance/contract/solana/mainnet/${CONFIG.pool}`, '_blank');
        }
    </script>
</body>
</html>
