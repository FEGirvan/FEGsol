<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEG SOL | Banana Farm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0a0a0b; color: #ffffff; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-morphism { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .duration-btn.active { background: rgba(124, 58, 237, 0.3) !important; border-color: #7c3aed !important; }
    </style>
</head>

<body class="bg-[#0a0a0b] min-h-screen">
    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <img src="G.PNG" class="w-8 h-8 rounded-full border border-purple-500">
                <span class="font-orbitron text-lg font-bold">FEG<span class="text-purple-500">SOL</span></span>
            </div>
            <button id="connect-btn" onclick="connect()" class="bg-purple-600 px-5 py-2 rounded-full font-orbitron text-[10px] text-white uppercase transition-all active:scale-95">
                Connect Wallet
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 pt-5">
        <div class="text-center mb-8">
            <h1 class="font-orbitron text-4xl font-bold gold-text uppercase italic">Banana Farm</h1>
            <p class="text-purple-400 font-orbitron text-[9px] tracking-[0.2em] mt-2">STAKING PROTOCOL v2.1</p>
        </div>

        <div class="glass-morphism p-6 mb-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-[9px] text-gray-400 font-orbitron uppercase">Your Rewards</p>
                    <p id="live-rewards" class="text-2xl font-bold text-yellow-500 font-orbitron">0.00</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-gray-400 font-orbitron uppercase">APR Status</p>
                    <p id="display-apr" class="text-2xl font-bold text-green-400 font-orbitron">40%</p>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <div class="flex justify-between text-[9px] font-orbitron uppercase mb-2">
                        <span class="text-gray-500 italic">Select Period</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="changeTier(3, 0.4, this)" class="tier-btn active glass-morphism py-2 text-[10px] font-orbitron">3D</button>
                        <button onclick="changeTier(7, 0.8, this)" class="tier-btn glass-morphism py-2 text-[10px] font-orbitron">7D</button>
                        <button onclick="changeTier(30, 1.6, this)" class="tier-btn glass-morphism py-2 text-[10px] font-orbitron">30D</button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between text-[9px] font-orbitron uppercase mb-2">
                        <span class="text-gray-500 italic">Stake Amount</span>
                        <span id="balance-text" class="text-purple-400 font-bold">Balance: 0.00</span>
                    </div>
                    <div class="relative">
                        <input type="number" id="stake-input" placeholder="0.0" class="w-full bg-black/50 border border-purple-500/20 rounded-xl px-4 py-3 font-orbitron text-white outline-none focus:border-purple-500">
                        <button onclick="setMax()" class="absolute right-3 top-3 text-[10px] font-orbitron text-purple-400">MAX</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="action()" class="bg-green-600/10 border border-green-500/30 text-green-400 py-3 rounded-xl font-orbitron text-[10px] uppercase">Harvest</button>
                    <button onclick="action()" class="bg-blue-600/10 border border-blue-500/30 text-blue-400 py-3 rounded-xl font-orbitron text-[10px] uppercase">Compound</button>
                </div>
                <button onclick="action()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl font-orbitron font-bold text-white shadow-lg uppercase tracking-widest mt-2">Stake Now</button>
            </div>
        </div>
    </main>

    <script>
        const MINT_ADDRESS = "49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump";
        const STAKE_URL = "https://app.streamflow.finance/contract/solana/mainnet/BHT2A2SN6zPKJr5xDejaKx9LN3F8E8f5WSmnehARFg9z";
        
        // RPC alternative jika mainnet-beta lemot
        const RPC_URL = "https://solana-mainnet.rpc.extrnode.com"; 
        const connection = new solanaWeb3.Connection(RPC_URL, "confirmed");

        let walletAddress = null;
        let userHoldings = 0;

        async function updateBalance(addr) {
            try {
                const pubKey = new solanaWeb3.PublicKey(addr);
                const mint = new solanaWeb3.PublicKey(MINT_ADDRESS);
                
                // Ambil semua akun token
                const accounts = await connection.getParsedTokenAccountsByOwner(pubKey, { mint: mint });
                
                if (accounts.value.length > 0) {
                    const info = accounts.value[0].account.data.parsed.info.tokenAmount;
                    userHoldings = info.uiAmount || 0;
                } else {
                    userHoldings = 0;
                }

                document.getElementById('balance-text').innerText = `Balance: ${userHoldings.toLocaleString()}`;
                document.getElementById('balance-text').classList.replace('text-purple-400', 'text-green-400');
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        async function connect() {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    walletAddress = resp.publicKey.toString();
                    
                    const btn = document.getElementById('connect-btn');
                    btn.innerText = walletAddress.substring(0,4) + "..." + walletAddress.substring(walletAddress.length-4);
                    btn.classList.replace('bg-purple-600', 'bg-green-600');
                    
                    // Kasih jeda sedikit biar koneksi stabil baru tarik data
                    setTimeout(() => updateBalance(walletAddress), 800);
                } catch (e) { }
            } else {
                window.open('https://phantom.app/', '_blank');
            }
        }

        function changeTier(days, apr, el) {
            document.getElementById('display-apr').innerText = (apr * 100) + '%';
            document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function setMax() {
            if (!walletAddress) return connect();
            document.getElementById('stake-input').value = userHoldings;
        }

        function action() {
            if (!walletAddress) return connect();
            window.open(STAKE_URL, '_blank');
        }

        // Auto-refresh saldo tiap 20 detik
        setInterval(() => { if(walletAddress) updateBalance(walletAddress); }, 20000);
    </script>
</body>
</html>
