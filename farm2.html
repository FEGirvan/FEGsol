<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEG SOL | Banana Farm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0a0a0b; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-morphism { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-gradient { background: radial-gradient(circle at center, #2e1065 0%, #0a0a0b 80%); }
        .duration-btn.active { background: rgba(124, 58, 237, 0.2) !important; border-color: #7c3aed !important; }
    </style>
</head>

<body class="hero-gradient min-h-screen">
    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="G.PNG" alt="Logo" class="w-10 h-10 rounded-full border border-purple-500">
                <span class="font-orbitron text-xl font-bold uppercase tracking-tighter">FEG<span class="text-purple-500">SOL</span></span>
            </div>
            <button id="wallet-adapter-btn" onclick="handleWalletAction()" class="bg-purple-600 px-6 py-2 rounded-full font-orbitron text-[10px] text-white uppercase active:scale-95 transition-all">
                Connect Wallet
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 pt-10 pb-10">
        <header class="text-center mb-12">
            <h1 class="font-orbitron text-4xl md:text-6xl font-bold gold-text mb-4 uppercase italic">Banana Farm</h1>
            <p class="text-purple-400 font-orbitron text-[10px] tracking-[0.3em] uppercase italic">Staking Status: <span class="text-green-400">ONLINE</span></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
            <div class="glass-morphism p-6 border-b-4 border-yellow-500">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Current APR</p>
                <p class="text-2xl font-bold font-orbitron text-green-400" id="display-apr">40%</p>
            </div>
            <div class="glass-morphism p-6 border-b-4 border-blue-500 md:col-span-2">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Your Earnings</p>
                <p class="text-2xl font-bold font-orbitron text-yellow-500" id="live-rewards">0.00</p>
            </div>
        </div>

        <div class="glass-morphism p-8 border-t-2 border-purple-500/30">
            <div class="mb-8">
                <label class="text-[9px] font-orbitron text-gray-500 uppercase block mb-4">1. Select Locking Duration</label>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="setDuration(3, 0.4, this)" class="duration-btn active glass-morphism py-3 text-[10px] font-orbitron text-white uppercase">3 Days <br><span class="text-green-400">40% APR</span></button>
                    <button onclick="setDuration(7, 0.8, this)" class="duration-btn glass-morphism py-3 text-[10px] font-orbitron text-white uppercase">7 Days <br><span class="text-green-400">80% APR</span></button>
                    <button onclick="setDuration(30, 1.6, this)" class="duration-btn glass-morphism py-3 text-[10px] font-orbitron text-white uppercase">30 Days <br><span class="text-green-400">160% APR</span></button>
                </div>
            </div>

            <div class="mb-8">
                <div class="flex justify-between items-end mb-2 text-[9px] font-orbitron uppercase">
                    <label class="text-gray-500">2. Amount to Stake</label>
                    <span id="user-balance-display" class="text-purple-400 font-bold tracking-widest">Balance: 0 $FEGSOL</span>
                </div>
                <div class="relative">
                    <input type="number" id="stake-input" placeholder="0.0" class="w-full bg-black/40 border border-purple-500/30 rounded-xl px-6 py-4 font-orbitron focus:border-purple-500 outline-none text-white">
                    <button onclick="maxAmount()" class="absolute right-4 top-4 text-[10px] font-orbitron text-purple-400 uppercase hover:text-white transition">Max</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="executeAction()" class="bg-green-600/20 border border-green-500/50 text-green-400 py-3 rounded-xl font-orbitron text-[10px] uppercase">Harvest</button>
                <button onclick="executeAction()" class="bg-blue-600/20 border border-blue-500/50 text-blue-400 py-3 rounded-xl font-orbitron text-[10px] uppercase">Compound</button>
            </div>

            <button onclick="executeAction()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl font-orbitron font-bold uppercase text-white shadow-xl active:scale-95 transition-all">Stake Now</button>
        </div>
    </main>

    <script>
        // DATA TOKEN
        const TOKEN_CA = "49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump";
        const POOL_LINK = "https://app.streamflow.finance/contract/solana/mainnet/BHT2A2SN6zPKJr5xDejaKx9LN3F8E8f5WSmnehARFg9z";
        
        // GUNAKAN RPC PUBLIC YANG LEBIH STABIL
        const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");

        let userWallet = null;
        let userBalance = 0;

        // FUNGSI AMBIL SALDO (VERSI PAKSA)
        async function fetchBalance(address) {
            try {
                const pubKey = new solanaWeb3.PublicKey(address);
                const mintPubKey = new solanaWeb3.PublicKey(TOKEN_CA);
                
                // Cari akun token
                const accounts = await connection.getParsedTokenAccountsByOwner(pubKey, { mint: mintPubKey });
                
                if (accounts.value.length > 0) {
                    // Jika ketemu akunnya
                    const amount = accounts.value[0].account.data.parsed.info.tokenAmount.uiAmount;
                    userBalance = amount || 0;
                } else {
                    // Jika user belum pernah punya token sama sekali
                    userBalance = 0;
                }

                // Update UI
                const display = document.getElementById('user-balance-display');
                display.innerText = `Balance: ${userBalance.toLocaleString()} $FEGSOL`;
                display.classList.replace('text-purple-400', 'text-green-400');
                
            } catch (err) {
                console.error("Gagal tarik saldo:", err);
            }
        }

        // FUNGSI KONEK DOMPET
        async function handleWalletAction() {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    userWallet = resp.publicKey.toString();
                    
                    // Ganti teks tombol
                    const btn = document.getElementById('wallet-adapter-btn');
                    btn.innerText = userWallet.substring(0,4) + "..." + userWallet.substring(userWallet.length-4);
                    btn.classList.replace('bg-purple-600', 'bg-green-600');
                    
                    // Tarik Saldo
                    fetchBalance(userWallet);
                    
                    Swal.fire({ title: 'Connected!', text: 'Scanning balance...', icon: 'success', timer: 1500, showConfirmButton: false, background: '#0a0a0b', color: '#fff' });
                } catch (e) { console.warn("Koneksi ditolak"); }
            } else {
                window.open('https://phantom.app/', '_blank');
            }
        }

        function setDuration(days, apr, el) {
            document.getElementById('display-apr').innerText = (apr * 100) + '%';
            document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function maxAmount() {
            if (!userWallet) return handleWalletAction();
            document.getElementById('stake-input').value = userBalance;
        }

        function executeAction() {
            if (!userWallet) return handleWalletAction();
            window.open(POOL_LINK, '_blank');
        }

        // Cek berkala setiap 10 detik kalau sudah connect
        setInterval(() => { if(userWallet) fetchBalance(userWallet); }, 10000);
    </script>
</body>
</html>
