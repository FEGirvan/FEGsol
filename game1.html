<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // --- KONFIGURASI BLOCKCHAIN ---
    const MINT_ADDRESS = "49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump"; 
    const HELIUS_RPC = "https://mainnet.helius-rpc.com/?api-key=066b5771-93f3-4f21-b935-c95d78335e30";
    const connection = new solanaWeb3.Connection(HELIUS_RPC);

    let userBalance = 0, isVIP = false, isStandard = false, walletConnected = false;
    let score = 0, isGameOver = true, speed = 4.5, lastX = 0;
    
    const frame = document.getElementById('game-frame');
    const gorilla = document.getElementById('gorilla');
    const connectBtn = document.getElementById('connect-btn');
    const bgMusic = document.getElementById('bg-music');

    // --- FUNGSI CONNECT YANG LEBIH STABIL ---
    async function connectPhantom() {
        // 1. Cek apakah Phantom terinstall
        const isPhantomInstalled = window.solana && window.solana.isPhantom;

        if (!isPhantomInstalled) {
            Swal.fire('Wallet Tidak Ditemukan', 'Silakan install Phantom Wallet dulu ya, Dev!', 'warning');
            window.open("https://phantom.app/", "_blank");
            return;
        }

        try {
            // 2. Proses Connect
            const resp = await window.solana.connect();
            const walletAddr = resp.publicKey.toString();
            
            // Tampilkan loading pas cek saldo
            Swal.fire({
                title: 'Sedang Mengecek Saldo...',
                text: 'Memverifikasi status holder FEG SOL',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            // 3. Ambil Saldo Token FEG SOL
            const balance = await getFegBalance(walletAddr);
            userBalance = balance;
            
            Swal.close();

            // 4. Logika Minimal 1 Juta Koin
            if (userBalance < 1000000) {
                Swal.fire({
                    icon: 'error',
                    title: 'Saldo Tidak Cukup',
                    text: `Koin kamu cuma ${userBalance.toLocaleString()}. Minimal butuh 1.000.000 FEG SOL buat main!`,
                    confirmButtonText: 'Beli Koin Sekarang'
                }).then(() => {
                    window.open('https://jup.ag/swap/SOL-' + MINT_ADDRESS, '_blank');
                });
                return;
            }

            // 5. Berhasil Masuk
            walletConnected = true;
            isVIP = userBalance >= 2000000;
            isStandard = userBalance >= 1000000;

            connectBtn.innerText = walletAddr.slice(0,4) + "..." + walletAddr.slice(-4);
            connectBtn.style.background = "#22c55e"; // Berubah hijau kalau sukses
            
            updateTierUI();
            initGame(); // Mulai game otomatis

        } catch (err) {
            console.error("Connect Error:", err);
            Swal.fire('Gagal Connect', 'Coba refresh halaman atau cek koneksi Phantom kamu.', 'error');
        }
    }

    // --- FUNGSI AMBIL SALDO (Paling Akurat) ---
    async function getFegBalance(walletAddr) {
        try {
            const pubKey = new solanaWeb3.PublicKey(walletAddr);
            const tokenAccounts = await connection.getParsedTokenAccountsByOwner(pubKey, {
                mint: new solanaWeb3.PublicKey(MINT_ADDRESS)
            });

            if (tokenAccounts.value.length > 0) {
                // Ambil jumlah token (sudah dibagi decimal-nya otomatis)
                return tokenAccounts.value[0].account.data.parsed.info.tokenAmount.uiAmount;
            }
            return 0;
        } catch (e) {
            console.error("Gagal ambil saldo:", e);
            return 0;
        }
    }

    // --- TAMPILAN TIER ---
    function updateTierUI() {
        const std = document.getElementById('tier-std');
        const vip = document.getElementById('tier-vip');
        std.classList.remove('active');
        vip.classList.remove('active');

        if (isVIP) {
            vip.classList.add('active');
            Swal.fire('Mode VIP Aktif!', 'Kamu main dengan reward maksimal 750 FEG.', 'success');
        } else {
            std.classList.add('active');
            Swal.fire('Mode Standar Aktif!', 'Kumpulkan 2 Juta koin untuk Mode VIP!', 'info');
        }
    }

    // Sisa kode game (initGame, createBanana, update, dll) tetap pakai yang sebelumnya ya, Dev.
    // Pastikan fungsi moveHandler tetap aktif supaya monyetnya bisa gerak.
</script>
