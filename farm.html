<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEG SOL | Banana Farm (Staking)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0a0a0b; color: #ffffff; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-morphism { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-gradient { background: radial-gradient(circle at center, #2e1065 0%, #0a0a0b 80%); }
    </style>
</head>
<body class="hero-gradient min-h-screen">

    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="G.PNG" alt="Logo" class="w-10 h-10 rounded-full border border-purple-500">
                <span class="font-orbitron text-xl font-bold uppercase tracking-tighter">FEG<span class="text-purple-500">SOL</span></span>
            </a>
            <button class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-full font-orbitron text-xs transition duration-300 border border-purple-400/50 shadow-lg shadow-purple-500/20">
                CONNECT WALLET
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 pt-10 pb-20">
        <header class="text-center mb-12">
            <h1 class="font-orbitron text-4xl md:text-6xl font-bold gold-text mb-4 uppercase italic">Banana Farm</h1>
            <p class="text-purple-400 font-orbitron text-xs tracking-[0.3em] uppercase">Stake your $FEGSOL, Earn Rewards</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-morphism p-6 text-center border-b-4 border-yellow-500">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Total Staked</p>
                <p class="text-2xl font-bold font-orbitron">0.00</p>
            </div>
            <div class="glass-morphism p-6 text-center border-b-4 border-purple-500">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Estimated APR</p>
                <p class="text-2xl font-bold font-orbitron text-green-400">169%</p>
            </div>
            <div class="glass-morphism p-6 text-center border-b-4 border-blue-500">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Your Earnings</p>
                <p class="text-2xl font-bold font-orbitron text-yellow-500">0.00</p>
            </div>
        </div>

        <div class="glass-morphism p-8 md:p-12 border-t-2 border-purple-500/30">
            <div class="flex flex-col md:flex-row gap-8 items-center">
                <div class="w-full">
                    <label class="block text-[10px] font-orbitron text-gray-500 mb-2 uppercase tracking-widest">Amount to Stake</label>
                    <div class="relative">
                        <input type="number" placeholder="0.0" class="w-full bg-black/40 border border-purple-500/30 rounded-xl px-6 py-4 font-orbitron focus:outline-none focus:border-purple-500 transition">
                        <button class="absolute right-4 top-4 text-xs font-orbitron text-purple-400 hover:text-white uppercase">Max</button>
                    </div>
                </div>
                <div class="w-full md:w-auto flex flex-col gap-4">
                    <button class="w-full md:w-48 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 py-4 rounded-xl font-orbitron font-bold transition duration-300 shadow-xl shadow-purple-500/20 uppercase tracking-widest">
                        Stake Now
                    </button>
                    <button class="w-full md:w-48 bg-white/5 hover:bg-white/10 border border-white/10 py-4 rounded-xl font-orbitron text-xs transition duration-300 uppercase">
                        Unstake
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 opacity-50">
        <p class="text-[10px] font-orbitron uppercase tracking-widest">FEGSOL Ecosystem &copy; 2026</p>
    </footer>

</body>
</html>
