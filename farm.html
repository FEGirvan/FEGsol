<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEG SOL | Banana Farm (Staking)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            background-color: #0a0a0b; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        .glass-morphism { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-morphism:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.1);
        }

        .gold-text { 
            background: linear-gradient(to right, #fde047, #ca8a04); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .hero-gradient { 
            background: radial-gradient(circle at center, #2e1065 0%, #0a0a0b 80%); 
        }

        /* Efek Glow untuk APR */
        .apr-glow {
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.6);
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="hero-gradient min-h-screen">

    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3 group text-white decoration-0 no-underline">
                <img src="G.PNG" alt="Logo" class="w-10 h-10 rounded-full border border-purple-500 group-hover:rotate-12 transition-transform">
                <span class="font-orbitron text-xl font-bold uppercase tracking-tighter">FEG<span class="text-purple-500">SOL</span></span>
            </a>
            <button id="connect-wallet" class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-full font-orbitron text-[10px] transition duration-300 border border-purple-400/50 shadow-lg shadow-purple-500/20 active:scale-95">
                CONNECT WALLET
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 pt-10 pb-20">
        <header class="text-center mb-12">
            <h1 class="font-orbitron text-4xl md:text-6xl font-bold gold-text mb-4 uppercase italic">Banana Farm</h1>
            <p class="text-purple-400 font-orbitron text-[10px] tracking-[0.3em] uppercase">Stake your $FEGSOL, Earn Rewards</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-morphism p-6 text-center border-b-4 border-yellow-500">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Total Staked</p>
                <p class="text-2xl font-bold font-orbitron"><span id="total-staked">1,240,550</span></p>
            </div>
            <div class="glass-morphism p-6 text-center border-b-4 border-purple-500">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Estimated APR</p>
                <p class="text-2xl font-bold font-orbitron text-green-400 apr-glow">169%</p>
            </div>
            <div class="glass-morphism p-6 text-center border-b-4 border-blue-500">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Live Rewards</p>
                <p class="text-2xl font-bold font-orbitron text-yellow-500"><span id="live-rewards">0.00</span></p>
            </div>
        </div>

        <div class="glass-morphism p-8 md:p-12 border-t-2 border-purple-500/30">
            <div class="flex flex-col md:flex-row gap-8 items-center">
                <div class="w-full">
                    <div class="flex justify-between items-end mb-2 text-[9px] font-orbitron uppercase tracking-widest">
                        <label class="text-gray-500">Amount to Stake</label>
                        <span class="text-purple-400 font-bold">Balance: 0 $FEGSOL</span>
                    </div>
                    <div class="relative">
                        <input type="number" id="stake-input" placeholder="0.0" class="w-full bg-black/40 border border-purple-500/30 rounded-xl px-6 py-4 font-orbitron focus:outline-none focus:border-purple-500 transition text-white placeholder-gray-700">
                        <button onclick="maxAmount()" class="absolute right-4 top-4 text-[10px] font-orbitron text-purple-400 hover:text-white uppercase transition">Max</button>
                    </div>
                </div>
                <div class="w-full md:w-auto flex flex-col gap-4">
                    <button id="stake-btn" class="w-full md:w-48 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 py-4 rounded-xl font-orbitron font-bold transition duration-300 shadow-xl shadow-purple-500/20 uppercase tracking-widest active:scale-95">
                        Stake Now
                    </button>
                    <button id="unstake-btn" class="w-full md:w-48 bg-white/5 hover:bg-white/10 border border-white/10 py-4 rounded-xl font-orbitron text-[10px] transition duration-300 uppercase active:scale-95 text-gray-400">
                        Unstake
                    </button>
                </div>
            </div>
            
            <div class="mt-8 pt-6 border-t border-white/5">
                <p class="text-[10px] text-center text-gray-500 font-orbitron italic uppercase tracking-tighter">
                    Note: Staked tokens are locked until the Raydium migration is complete.
                </p>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 opacity-50">
        <p class="text-[10px] font-orbitron uppercase tracking-widest">FEGSOL Ecosystem &copy; 2026</p>
    </footer>

    <script>
        // 1. NOTIFICATION SYSTEM
        function showNotice(title, text, type = 'info') {
            Swal.fire({
                title: title,
                text: text,
                icon: type,
                background: '#0a0a0b',
                color: '#ffffff',
                confirmButtonColor: '#9333ea',
                customClass: {
                    popup: 'glass-morphism border border-purple-500/30 font-orbitron'
                }
            });
        }

        // 2. BUTTON LOGIC
        document.getElementById('connect-wallet').onclick = () => {
            showNotice('Wallet Integration', 'Solana Wallet integration (Phantom/Solflare) will be activated after our official launch on April 23!', 'warning');
        };

        document.getElementById('stake-btn').onclick = () => {
            const val = document.getElementById('stake-input').value;
            // Kita arahkan ke Telegram atau X agar mereka join komunitas
            Swal.fire({
                title: 'Banana Farm Locked!',
                text: 'Staking opens after Raydium migration. Join our community for updates!',
                icon: 'lock',
                showCancelButton: true,
                confirmButtonText: 'Join Community',
                cancelButtonText: 'Close',
                background: '#0a0a0b',
                color: '#ffffff',
                confirmButtonColor: '#22c55e',
                customClass: {
                    popup: 'glass-morphism border border-purple-500/30'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    window.open('https://t.me/FEGsol', '_blank'); // Ganti link tele kamu
                }
            });
        };

        document.getElementById('unstake-btn').onclick = () => {
            showNotice('Unstake Feature', 'No active stakes found. Feature will be available once the pools are officially opened.');
        };

        function maxAmount() {
            document.getElementById('stake-input').value = 0;
            showNotice('Balance Empty', 'You do not have $FEGSOL in your wallet yet. Wait for launch!', 'error');
        }

        // 3. LIVE DATA SIMULATION (Membuat Web Terlihat Aktif)
        let totalStaked = 1240550;
        let userRewards = 0.00;

        setInterval(() => {
            // Simulasi Total Staked naik perlahan (biar keliatan rame)
            totalStaked += Math.floor(Math.random() * 85);
            document.getElementById('total-staked').innerText = totalStaked.toLocaleString();

            // Simulasi Rewards berjalan pelan
            userRewards += 0.0001;
            document.getElementById('live-rewards').innerText = userRewards.toFixed(4);
        }, 3000);
    </script>

</body>
</html>
