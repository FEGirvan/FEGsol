<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEGsol | Smart Contract</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0a0a0b; color: #ffffff; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-morphism { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-gradient { background: radial-gradient(circle at center, #2e1065 0%, #0a0a0b 80%); }
    </style>
</head>
<body class="hero-gradient min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-xl w-full glass-morphism p-8 md:p-12 text-center shadow-2xl shadow-purple-900/40">
        <a href="index2.html" class="inline-block mb-8 text-purple-400 hover:text-white transition font-orbitron text-xs tracking-widest uppercase">
            <i class="fas fa-arrow-left mr-2"></i> Back to Home
        </a>

        <i class="fas fa-file-contract text-5xl text-purple-500 mb-6"></i>
        <h1 class="font-orbitron text-2xl md:text-3xl font-bold gold-text mb-4 uppercase">Smart Contract</h1>
        <p class="text-gray-400 text-sm mb-8">Official FEGsol Contract Address on Solana Network.</p>

        <div class="bg-black/50 p-4 rounded-xl border border-purple-500/30 flex items-center justify-between mb-6">
            <code id="ca-text" class="text-purple-300 text-xs md:text-sm break-all text-left mr-2">
                TBA_SOON_ON_LAUNCH
            </code>
            <button onclick="copyCA()" class="text-purple-400 hover:text-white p-2">
                <i class="fas fa-copy"></i>
            </button>
        </div>

        <p id="copy-status" class="text-green-500 text-xs font-bold uppercase tracking-widest h-4"></p>

        <div class="mt-8 pt-8 border-t border-white/5 space-y-4">
            <p class="text-[10px] text-gray-500 font-orbitron uppercase tracking-widest leading-relaxed">
                Always verify the contract address <br> before making any transaction.
            </p>
        </div>
    </div>

    <script>
        function copyCA() {
            const caText = document.getElementById('ca-text').innerText;
            navigator.clipboard.writeText(caText);
            const status = document.getElementById('copy-status');
            status.innerText = "COPIED TO CLIPBOARD!";
            setTimeout(() => { status.innerText = ""; }, 2000);
        }
    </script>

</body>
</html>
