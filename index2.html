<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEGsol | The Future of Solana Ape Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body {
            background-color: #0a0a0b;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .hero-gradient {
            background: radial-gradient(circle at center, #4c1d95 0%, #0a0a0b 70%);
        }

        .gold-text {
            background: linear-gradient(to right, #fde047, #ca8a04);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(90deg, #7c3aed, #9333ea);
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.4);
        }

        /* Efek Glow untuk Logo Degen Gorilla */
        .logo-glow {
            filter: drop-shadow(0 0 10px rgba(124, 58, 237, 0.8));
            transition: all 0.3s ease;
        }
        .logo-glow:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 18px rgba(253, 224, 71, 0.9));
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-morphism px-8 py-3">
            <div class="flex items-center space-x-2">
                <img src="G.PNG" alt="FEGsol Logo" class="w-10 h-10 rounded-full object-cover logo-glow border border-purple-500/30">
                <span class="font-orbitron text-lg font-bold tracking-widest leading-none">FEG<span class="text-purple-500">SOL</span></span>
            </div>
            
            <div class="hidden md:flex space-x-8 font-orbitron text-sm uppercase tracking-wider">
                <a href="#about" class="hover:text-purple-400 transition">About</a>
                <a href="#roadmap" class="hover:text-purple-400 transition">Roadmap</a>
                <a href="#ecosystem" class="hover:text-purple-400 transition">Ecosystem</a>
                <a href="https://t.me/+16oraMVw88w3MmU9" target="_blank" class="hover:text-purple-400 transition">Community</a>
            </div>
            
            <div class="flex items-center space-x-3">
                <i class="fab fa-solana text-purple-400 text-3xl"></i>
                <span class="hidden md:inline font-orbitron text-xs font-bold uppercase tracking-widest">Connect</span>
            </div>
        </div>
    </nav>

    <section id="about" class="relative min-h-screen flex items-center justify-center pt-24 hero-gradient">
        <div class="relative z-10 text-center px-6">
            <img src="G.PNG" alt="FEGSOL Degen Gorilla" class="w-40 h-40 md:w-56 md:h-56 mx-auto mb-10 logo-glow rounded-full object-cover border-4 border-gold-500/20 shadow-lg shadow-purple-900/50">

            <h1 class="text-4xl md:text-8xl font-orbitron font-bold mb-6 tracking-tighter">
                WE BUILD <br> <span class="gold-text">THE FUTURE</span>
            </h1>
            <p class="text-gray-400 max-w-2xl mx-auto text-lg md:text-xl mb-10 leading-relaxed font-light">
                FEGsol is a high-performance ecosystem on Solana built for the strongest community. Quality first, chart second.
            </p>
            <div class="flex flex-col md:flex-row items-center justify-center gap-4">
                <a href="https://t.me/+16oraMVw88w3MmU9" target="_blank" class="btn-primary px-10 py-4 rounded-xl font-orbitron text-sm font-bold w-full md:w-auto">
                    JOIN THE RAID
                </a>
                <a href="#roadmap" class="glass-morphism px-10 py-4 rounded-xl font-orbitron text-sm font-bold w-full md:w-auto hover:bg-white hover:bg-opacity-5 transition">
                    VIEW ROADMAP
                </a>
            </div>
        </div>
    </section>

    </body>
</html>
