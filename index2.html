<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEGsol | The Future of Solana Ape Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body {
            background-color: #0a0a0b;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .hero-gradient {
            background: radial-gradient(circle at center, #2e1065 0%, #0a0a0b 80%);
        }

        .gold-text {
            background: linear-gradient(to right, #fde047, #ca8a04);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .btn-primary {
            background: linear-gradient(90deg, #7c3aed, #9333ea);
            transition: all 0.3s ease;
        }

        /* Efek Glow Ungu seperti di foto */
        .ape-glow {
            filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.5));
            border: 2px solid rgba(168, 85, 247, 0.3);
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-morphism px-5 py-2">
            <div class="flex items-center space-x-2">
                <img src="G.PNG" alt="Logo" class="w-8 h-8 rounded-full border border-purple-500/50">
                <span class="font-orbitron text-base font-bold tracking-tighter">FEG<span class="text-purple-500">SOL</span></span>
            </div>
            
            <div class="flex items-center space-x-2">
                <div class="bg-purple-900/40 p-1.5 rounded-lg border border-purple-500/30">
                    <i class="fab fa-solana text-purple-400 text-xl"></i>
                </div>
                <i class="fas fa-bars text-gray-400 ml-2"></i>
            </div>
        </div>
    </nav>

    <section class="relative min-h-screen flex flex-col items-center justify-center pt-20 hero-gradient text-center px-6">
        
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-purple-600/20 blur-3xl rounded-full"></div>
            <img src="G.PNG" alt="FEGsol Gorilla" class="relative w-48 h-48 md:w-64 md:h-64 rounded-full object-cover ape-glow">
        </div>

        <h1 class="text-4xl md:text-7xl font-orbitron font-bold leading-none mb-4 tracking-tight">
            WE BUILD <br> 
            <span class="gold-text">THE FUTURE</span>
        </h1>

        <p class="text-gray-400 max-w-md mx-auto text-sm md:text-lg mb-8 font-light">
            FEGsol is a high-performance ecosystem on Solana built for the strongest community.
        </p>

        <div class="flex flex-col gap-3 w-full max-w-xs">
            <a href="https://t.me/+16oraMVw88w3MmU9" target="_blank" class="btn-primary py-3 rounded-xl font-orbitron text-xs font-bold tracking-widest uppercase">
                Join the Raid
            </a>
            <a href="#roadmap" class="bg-white/5 border border-white/10 py-3 rounded-xl font-orbitron text-xs font-bold tracking-widest uppercase hover:bg-white/10 transition">
                View Roadmap
            </a>
        </div>

    </section>

    <footer class="py-8 text-center border-t border-white/5">
        <div class="flex justify-center space-x-6 text-2xl text-gray-500 mb-4">
            <a href="https://x.com/fegirvan?s=21" target="_blank"><i class="fab fa-twitter hover:text-white transition"></i></a>
            <a href="https://t.me/+16oraMVw88w3MmU9" target="_blank"><i class="fab fa-telegram hover:text-white transition"></i></a>
        </div>
        <p class="text-[10px] text-gray-600 font-orbitron uppercase tracking-[0.2em]">&copy; 2026 FEGSOL ECOSYSTEM</p>
    </footer>

</body>
</html>
