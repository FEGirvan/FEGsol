<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEGsol | The Future of Solana Ape Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body {
            background-color: #0a0a0b;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .hero-gradient {
            background: radial-gradient(circle at center, #2e1065 0%, #0a0a0b 80%);
        }

        .gold-text {
            background: linear-gradient(to right, #fde047, #ca8a04);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .btn-primary {
            background: linear-gradient(90deg, #7c3aed, #9333ea);
            transition: all 0.3s ease;
        }

        .ape-glow {
            filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.5));
            border: 2px solid rgba(168, 85, 247, 0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0b; }
        ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 10px; }

        /* Jupiter Styling Fix */
        #integrated-terminal {
            width: 100%;
            min-height: 520px;
            background: rgba(13, 13, 15, 0.5) !important;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] px-4 py-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-morphism px-6 py-4 border-2 border-purple-500/20 bg-[#0a0a0b]/80">
            <div class="flex items-center space-x-4">
                <img src="G.PNG" alt="Logo" class="w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-purple-500/50">
                <a href="index.html" class="font-orbitron text-xl md:text-2xl font-bold tracking-tighter uppercase">
                    FEG<span class="text-purple-500">SOL</span>
                </a>
            </div>
            
            <div class="relative">
                <button id="mobile-menu-button" class="bg-purple-900/60 p-3 rounded-2xl border border-purple-500/50 hover:bg-purple-600 transition duration-300">
                    <i class="fas fa-bars text-xl text-purple-200"></i>
                </button>
                
                <div id="mobile-menu" class="absolute right-0 mt-3 w-64 glass-morphism overflow-hidden hidden bg-[#0a0a0b]/95 border border-purple-500/30 shadow-2xl z-[110]">
                    <div class="px-6 py-3 bg-purple-900/20 border-b border-white/5">
                        <p class="text-[10px] font-orbitron text-purple-400 uppercase tracking-widest font-bold">Project Status</p>
                    </div>
                    <a href="story.html" class="block px-6 py-4 text-sm font-orbitron hover:bg-purple-600/30 border-b border-white/5 text-white">Our Story</a>
                    <a href="https://t.me/+16oraMVw88w3MmU9" target="_blank" class="block px-6 py-4 text-sm font-orbitron hover:bg-purple-600/30 font-bold text-blue-400">Join Community</a>
                </div>
            </div>
        </div>
    </nav>

    <section id="about" class="relative min-h-screen flex flex-col items-center justify-center pt-28 hero-gradient text-center px-6">
        <div class="relative mb-8 mt-4">
            <div class="absolute inset-0 bg-purple-600/20 blur-3xl rounded-full"></div>
            <img src="G.PNG" alt="FEGsol Gorilla" class="relative w-44 h-44 md:w-60 md:h-60 rounded-full object-cover ape-glow">
        </div>

        <h1 class="text-4xl md:text-7xl font-orbitron font-bold leading-none mb-4 tracking-tight">
            WE BUILD <br> 
            <span class="gold-text">THE FUTURE</span>
        </h1>

        <div class="mb-10 w-full max-w-lg mx-auto">
            <p class="font-orbitron text-[10px] tracking-[0.4em] uppercase text-purple-400 mb-4 text-center">Launching In:</p>
            <div class="grid grid-cols-4 gap-2 md:gap-4">
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-yellow-500 text-center">
                    <span id="days" class="block text-2xl md:text-4xl font-bold font-orbitron gold-text">00</span>
                    <span class="text-[8px] md:text-[10px] uppercase tracking-widest text-gray-500">Days</span>
                </div>
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-purple-500 text-center">
                    <span id="hours" class="block text-2xl md:text-4xl font-bold font-orbitron text-white">00</span>
                    <span class="text-[8px] md:text-[10px] uppercase tracking-widest text-gray-400">Hours</span>
                </div>
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-blue-500 text-center">
                    <span id="minutes" class="block text-2xl md:text-4xl font-bold font-orbitron text-white">00</span>
                    <span class="text-[8px] md:text-[10px] uppercase tracking-widest text-gray-400">Mins</span>
                </div>
                <div class="glass-morphism p-3 md:p-4 border-b-2 border-pink-500 text-center">
                    <span id="seconds" class="block text-2xl md:text-4xl font-bold font-orbitron text-white animate-pulse">00</span>
                    <span class="text-[8px] md:text-[10px] uppercase tracking-widest text-gray-400">Secs</span>
                </div>
            </div>
            <p class="mt-4 text-[9px] font-orbitron text-gray-600 tracking-widest uppercase">Official Launch: April 23, 2026</p>
        </div>

        <div class="flex flex-col gap-3 w-full max-w-xs mb-8">
            <a href="https://t.me/+16oraMVw88w3MmU9" target="_blank" class="btn-primary py-3 rounded-xl font-orbitron text-xs font-bold tracking-widest uppercase text-center">Join the Raid</a>
            <button onclick="copyCA()" class="bg-white/5 border border-white/10 py-3 rounded-xl font-orbitron text-xs font-bold tracking-widest uppercase hover:bg-white/10 transition group">
                <span id="ca-text">Copy Contract Address</span>
            </button>
        </div>
    </section>

    <section id="tokenomics" class="py-20 px-6 max-w-4xl mx-auto border-t border-white/5">
        <h2 class="font-orbitron text-3xl font-bold text-center mb-12 gold-text uppercase tracking-widest">Tokenomics</h2>
        <div class="glass-morphism p-8 md:p-12 space-y-8 mb-10">
            <div class="flex justify-between items-center border-b border-white/5 pb-6">
                <span class="text-gray-400 font-orbitron text-[10px] md:text-xs uppercase tracking-[0.2em]">Total Supply</span>
                <div class="text-right">
                    <div id="supply-count" data-target="1000000000" class="text-xl md:text-3xl font-bold font-orbitron text-white leading-none">0</div>
                    <div class="text-purple-500 font-bold font-orbitron text-xs md:text-sm mt-1 tracking-widest">$FEGSOL</div>
                </div>
            </div>
        </div>
    </section>

    <section id="swap" class="py-20 px-6">
        <div class="max-w-md mx-auto text-center">
            <h2 class="font-orbitron text-2xl font-bold mb-8 gold-text uppercase tracking-widest">Direct Swap</h2>
            <div id="integrated-terminal"></div>
            <p class="mt-4 text-[10px] text-gray-500 font-orbitron uppercase tracking-widest italic">Powered by Jupiter Terminal</p>
        </div>
    </section>

    <script src="https://terminal.jup.ag/main-v2.js" defer></script>

    <script>
        const CA_KITA = "DezXAZhfB9wvS6pLjnSxy4GvmdHJAYc42CscSNH31XJ4";

        // 1. JUPITER INITIALIZATION (SAFE MODE)
        function initJupiter() {
            if (window.Jupiter && typeof window.Jupiter.init === 'function') {
                window.Jupiter.init({
                    displayMode: 'integrated',
                    integratedTargetId: 'integrated-terminal',
                    endpoint: 'https://mainnet.helius-rpc.com/?api-key=7302484a-5795-460d-83f5-93116548a313', 
                    strictTokenList: false,
                    formProps: {
                        fixedInputMint: false,
                        fixedOutputMint: true,
                        initialOutputMint: CA_KITA,
                    },
                });
            } else {
                setTimeout(initJupiter, 1000);
            }
        }

        // 2. COUNTDOWN TIMER (SEPARATED)
        function startCountdown() {
            const countdownDate = new Date("April 23, 2026 20:00:00").getTime();
            setInterval(function() {
                const now = new Date().getTime();
                const distance = countdownDate - now;
                
                const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distance % (1000 * 60)) / 1000);

                if(document.getElementById("days")) {
                    document.getElementById("days").innerText = d.toString().padStart(2, '0');
                    document.getElementById("hours").innerText = h.toString().padStart(2, '0');
                    document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
                    document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
                }
            }, 1000);
        }

        // 3. SUPPLY COUNTER ANIMATION
        function startSupplyCounter() {
            const supplyCount = document.getElementById('supply-count');
            const target = 1000000000;
            let current = 0;
            const increment = target / 50; 
            
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    supplyCount.innerText = target.toLocaleString();
                    clearInterval(timer);
                } else {
                    supplyCount.innerText = Math.floor(current).toLocaleString();
                }
            }, 30);
        }

        // RUN ALL
        document.addEventListener('DOMContentLoaded', () => {
            startCountdown();
            startSupplyCounter();
            initJupiter();
            
            // Mobile Menu Logic
            const menuBtn = document.getElementById('mobile-menu-button');
            const menu = document.getElementById('mobile-menu');
            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('hidden');
            });
            document.addEventListener('click', () => menu.classList.add('hidden'));
        });

        // COPY CA
        function copyCA() {
            navigator.clipboard.writeText(CA_KITA);
            const btnText = document.getElementById('ca-text');
            btnText.innerText = "CA Copied!";
            setTimeout(() => { btnText.innerText = "Copy Contract Address"; }, 2000);
        }
    </script>
</body>
</html>
