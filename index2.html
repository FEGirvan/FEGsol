    <script>
        const CA_KITA = "DezXAZhfB9wvS6pLjnSxy4GvmdHJAYc42CscSNH31XJ4"; // Test CA (BONK)

        // 1. COPY CA
        function copyCA() {
            navigator.clipboard.writeText(CA_KITA);
            const btnText = document.getElementById('ca-text');
            btnText.innerText = "CA Copied!";
            btnText.classList.add('text-green-400');
            setTimeout(() => {
                btnText.innerText = "Copy Contract Address";
                btnText.classList.remove('text-green-400');
            }, 2000);
        }

        // 2. REVEAL WALLET
        function revealWallet(id) {
            const el = document.getElementById(id);
            const allWallets = ['marketing-addr', 'burn-addr', 'dev-addr'];
            allWallets.forEach(walletId => {
                if(walletId !== id) document.getElementById(walletId).classList.add('hidden');
            });
            el.classList.toggle('hidden');
        }

        // 3. COUNTDOWN
        const countdownDate = new Date("April 23, 2026 20:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');
        }, 1000);

        // 4. COUNTER ANIMATION
        const supplyCount = document.getElementById('supply-count');
        const target = +supplyCount.getAttribute('data-target');
        const updateCount = () => {
            const current = +supplyCount.innerText.replace(/,/g, '');
            const increment = target / 100;
            if (current < target) {
                supplyCount.innerText = Math.ceil(current + increment).toLocaleString();
                setTimeout(updateCount, 20);
            } else { supplyCount.innerText = target.toLocaleString(); }
        };
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) { updateCount(); observer.disconnect(); }
        }, { threshold: 0.5 });
        observer.observe(supplyCount);

        // 5. MOBILE MENU
        const menuBtn = document.getElementById('mobile-menu-button');
        const menu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('hidden');
        });
        document.addEventListener('click', () => { menu.classList.add('hidden'); });
    </script>
