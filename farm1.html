<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@streamflow/stream/dist/browser/streamflow.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEG SOL | Banana Farm (Mainnet Ready)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        body {
            background: #0a0a0b;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 24px;
            transition: all .3s ease;
        }

        .glass-morphism:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.10);
        }

        .gold-text {
            background: linear-gradient(to right, #fde047, #ca8a04);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-gradient {
            background: radial-gradient(circle at center, #2e1065 0%, #0a0a0b 80%);
        }

        .apr-glow {
            text-shadow: 0 0 15px rgba(74, 222, 128, .6);
        }

        .duration-btn.active {
            background: rgba(124, 58, 237, .2) !important;
            border-color: #7c3aed !important;
            box-shadow: 0 0 15px rgba(124, 58, 237, .3);
        }

        .tier-badge {
            background: linear-gradient(45deg, #1e1b4b, #312e81);
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 0 10px rgba(124, 58, 237, .2);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 10px; }
    </style>
</head>

<body class="hero-gradient min-h-screen">

    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center space-x-3 text-white no-underline">
                <img src="G.PNG" class="w-10 h-10 rounded-full border border-purple-500" alt="Logo">
                <span class="font-orbitron text-xl font-bold uppercase tracking-tighter">
                    FEG<span class="text-purple-500">SOL</span>
                </span>
            </a>

            <button id="wallet-adapter-btn" onclick="handleWalletAction()"
                class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-full font-orbitron text-[10px] border border-purple-400/50 text-white uppercase transition-all">
                Connect Wallet
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 pt-10 pb-10">

        <header class="text-center mb-12">
            <h1 class="font-orbitron text-4xl md:text-6xl font-bold gold-text mb-4 uppercase italic">
                Banana Farm
            </h1>
            <p class="text-purple-400 font-orbitron text-[10px] tracking-[0.3em] uppercase italic">
                Staking Status: <span class="text-green-400">ONLINE</span>
            </p>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass-morphism p-4 text-center">
                <p class="text-[9px] text-gray-500 uppercase font-orbitron italic">Total Value Locked</p>
                <p class="text-xl font-bold font-orbitron text-white">$<span id="tvl-stat">0</span></p>
            </div>
            <div class="glass-morphism p-4 text-center">
                <p class="text-[9px] text-gray-500 uppercase font-orbitron italic">Total Rewards Paid</p>
                <p class="text-xl font-bold font-orbitron text-green-400"><span id="rewards-paid-stat">0</span></p>
            </div>
        </div>

        <div class="mb-10 text-center">
            <div class="inline-block tier-badge px-6 py-2 rounded-full">
                <p class="text-[8px] font-orbitron text-purple-300 uppercase mb-1">Your Gorilla Status</p>
                <p class="text-xs font-bold font-orbitron text-white italic">
                    <i class="fas fa-crown text-yellow-500 mr-2"></i> LEVEL: <span id="gorilla-level" class="text-yellow-400">BABY APE</span>
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-morphism p-6 text-center border-b-4 border-yellow-500">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Total Staked</p>
                <p class="text-2xl font-bold font-orbitron"><span id="total-staked">0</span></p>
            </div>
            <div class="glass-morphism p-6 text-center border-b-4 border-purple-500">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Selected APR</p>
                <p class="text-2xl font-bold font-orbitron text-green-400 apr-glow" id="display-apr">80%</p>
            </div>
            <div class="glass-morphism p-6 text-center border-b-4 border-blue-500">
                <p class="text-[10px] text-gray-400 uppercase font-orbitron mb-2">Your Rewards</p>
                <p class="text-2xl font-bold font-orbitron text-yellow-500"><span id="live-rewards">0</span></p>
            </div>
        </div>

        <div class="glass-morphism p-8 md:p-12 border-t-2 border-purple-500/30">
            
            <div class="mb-8">
                <label class="text-[9px] font-orbitron text-gray-500 uppercase block mb-4">1. Choose Staking Duration</label>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="setDuration(3,0.4,this)" class="duration-btn glass-morphism py-3 text-[10px] font-orbitron border text-white">
                        3 Days <br><span class="text-green-400">40% APR</span>
                    </button>
                    <button onclick="setDuration(7,0.8,this)" class="duration-btn active glass-morphism py-3 text-[10px] font-orbitron border text-white">
                        7 Days <br><span class="text-green-400">80% APR</span>
                    </button>
                    <button onclick="setDuration(30,1.6,this)" class="duration-btn glass-morphism py-3 text-[10px] font-orbitron border text-white">
                        30 Days <br><span class="text-green-400">160% APR</span>
                    </button>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-8 items-start">
                <div class="w-full">
                    <div class="flex justify-between mb-2 text-[9px] font-orbitron uppercase">
                        <label class="text-gray-500">2. Amount to Stake</label>
                        <span id="user-balance" class="text-purple-400 font-bold">Balance: 0 $FEGSOL</span>
                    </div>
                    <div class="relative">
                        <input type="number" id="stake-input" oninput="calculateReward()" placeholder="0.0"
                            class="w-full bg-black/40 border border-purple-500/30 rounded-xl px-6 py-4 text-white focus:outline-none focus:border-purple-500 transition-all">
                        <button onclick="maxAmount()" class="absolute right-4 top-4 text-[10px] font-orbitron text-purple-400 uppercase font-bold">Max</button>
                    </div>

                    <div class="mt-6 flex gap-3">
                        <button onclick="executeAction('Harvest')" class="flex-1 bg-green-600/20 hover:bg-green-600/40 border border-green-500/50 text-green-400 py-3 rounded-xl font-orbitron text-[10px] uppercase transition-all">
                            <i class="fas fa-seedling mr-2"></i> Harvest
                        </button>
                        <button onclick="executeAction('Compound')" class="flex-1 bg-blue-600/20 hover:bg-blue-600/40 border border-blue-500/50 text-blue-400 py-3 rounded-xl font-orbitron text-[10px] uppercase transition-all">
                            <i class="fas fa-sync-alt mr-2"></i> Compound
                        </button>
                    </div>
                </div>

                <div class="w-full md:w-auto">
                    <button onclick="executeAction('Stake')"
                        class="w-full md:w-48 bg-gradient-to-r from-purple-600 to-blue-600 hover:scale-105 active:scale-95 py-4 rounded-xl font-orbitron font-bold uppercase text-white shadow-lg transition-all">
                        Stake Now
                    </button>
                </div>
            </div>

            <div id="reward-display" class="mt-8 grid grid-cols-2 gap-4 hidden">
                <div class="bg-purple-900/10 border border-purple-500/10 p-3 rounded-lg text-center">
                    <p class="text-[8px] text-gray-400 font-orbitron uppercase">Daily Reward</p>
                    <p class="text-xs font-bold font-orbitron text-green-400">+ <span id="daily-reward">0</span> $FEGSOL</p>
                </div>
                <div class="bg-purple-900/10 border border-purple-500/10 p-3 rounded-lg text-center">
                    <p class="text-[8px] text-gray-400 font-orbitron uppercase">Total Reward (<span id="calc-days">7</span>d)</p>
                    <p class="text-xs font-bold font-orbitron text-yellow-500">+ <span id="period-reward">0</span> $FEGSOL</p>
                </div>
            </div>
        </div>

    </main>

    <script>
/* =========================
   STREAMFLOW CONFIG
========================= */
const CONFIG = {
    ca: "49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump",

    streamflow: {
        // 🔥 ISI DARI DASHBOARD STREAMFLOW KAMU
        poolId: "PASTE_POOL_ID",
        vault: "PASTE_VAULT_ADDRESS",
        programId: "PASTE_PROGRAM_ID"
    },

    rpc: "https://mainnet.helius-rpc.com/?api-key=066b5771-93f3-4f21-b935-c95d78335e30",
    estimatedPrice: 0.00001
};

/* =========================
   STATE
========================= */
let userWallet = null;
let userBalance = 0;
let currentAPR = 0.8;
let currentDays = 7;

const connection = new solanaWeb3.Connection(CONFIG.rpc, "confirmed");

/* =========================
   WALLET CONNECT
========================= */
async function handleWalletAction() {
    if (!window.solana || !window.solana.isPhantom) {
        window.open("https://phantom.app/", "_blank");
        return;
    }

    const resp = await window.solana.connect();
    userWallet = resp.publicKey.toString();

    document.getElementById("wallet-adapter-btn").innerText =
        userWallet.slice(0,4) + "..." + userWallet.slice(-4);

    await fetchUserBalance();
}

/* =========================
   BALANCE
========================= */
async function fetchUserBalance() {
    if (!userWallet) return;

    const owner = new solanaWeb3.PublicKey(userWallet);
    const mint = new solanaWeb3.PublicKey(CONFIG.ca);

    const res = await connection.getParsedTokenAccountsByOwner(owner, { mint });

    userBalance = 0;
    if (res.value.length > 0) {
        userBalance = res.value[0].account.data.parsed.info.tokenAmount.uiAmount;
    }

    document.getElementById("user-balance").innerText =
        "Balance: " + userBalance.toLocaleString() + " $FEGSOL";
}

/* =========================
   STAKE (FULL STREAMFLOW ON-CHAIN)
========================= */
async function stake(amount) {
    if (!amount || amount <= 0) return;

    try {
        const provider = window.solana;

        // 🔥 Streamflow SDK init
        const { StreamflowSolana } = window.Streamflow;

        const streamflow = new StreamflowSolana.StreamClient({
            clusterUrl: CONFIG.rpc,
            cluster: "mainnet-beta"
        });

        // 🔥 CREATE STAKE / STREAM
        const result = await streamflow.create({
            sender: new solanaWeb3.PublicKey(userWallet),
            recipient: new solanaWeb3.PublicKey(CONFIG.streamflow.vault),

            mint: new solanaWeb3.PublicKey(CONFIG.ca),

            amount: amount,

            start: Math.floor(Date.now() / 1000),
            period: currentDays * 24 * 60 * 60,

            cliff: 0,

            cancelableBySender: false,
            cancelableByRecipient: false,

            transferableBySender: false,
            transferableByRecipient: false,

            automaticWithdrawal: false,

            // optional metadata
            partner: "FEG-SOL-BANANA-FARM"
        });

        await provider.signAndSendTransaction(result.tx);

        Swal.fire("Success", "Staked to Streamflow 🚀", "success");

        fetchBlockchainStats();

    } catch (err) {
        console.log(err);
        Swal.fire("Error", "Stake failed", "error");
    }
}

/* =========================
   HARVEST (STREAMFLOW WITHDRAW)
========================= */
async function harvest() {
    try {
        const { StreamflowSolana } = window.Streamflow;

        const streamflow = new StreamflowSolana.StreamClient({
            clusterUrl: CONFIG.rpc,
            cluster: "mainnet-beta"
        });

        const result = await streamflow.withdraw({
            streamId: CONFIG.streamflow.poolId,
            receiver: new solanaWeb3.PublicKey(userWallet)
        });

        await window.solana.signAndSendTransaction(result.tx);

        Swal.fire("Harvested", "Reward claimed 🍌", "success");

    } catch (e) {
        console.log(e);
        Swal.fire("Error", "Harvest failed", "error");
    }
}

/* =========================
   COMPOUND (RESTAKE LOGIC)
========================= */
async function compound() {
    const amount = parseFloat(document.getElementById("stake-input").value || 0);

    if (!amount) return;

    await stake(amount); // auto restake
}

/* =========================
   ACTION ROUTER
========================= */
function executeAction(action) {
    if (!userWallet) {
        Swal.fire("Connect wallet dulu");
        return;
    }

    const amount = parseFloat(document.getElementById("stake-input").value || 0);

    if (action === "Stake") return stake(amount);
    if (action === "Harvest") return harvest();
    if (action === "Compound") return compound();
}

/* =========================
   UI CALC (TETAP)
========================= */
function setDuration(days, apr, el) {
    currentDays = days;
    currentAPR = apr;

    document.getElementById("display-apr").innerText = (apr * 100) + "%";
    document.getElementById("calc-days").innerText = days;

    document.querySelectorAll(".duration-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");

    calculateReward();
}

function calculateReward() {
    const amount = parseFloat(document.getElementById("stake-input").value || 0);

    if (!amount) return;

    const daily = (amount * currentAPR) / 365;
    const total = daily * currentDays;

    document.getElementById("daily-reward").innerText = daily.toFixed(2);
    document.getElementById("period-reward").innerText = total.toFixed(2);
    document.getElementById("live-rewards").innerText = total.toFixed(2);
}

function maxAmount() {
    document.getElementById("stake-input").value = userBalance;
    calculateReward();
}

/* =========================
   STATS LOOP
========================= */
async function fetchBlockchainStats() {
    try {
        const owner = new solanaWeb3.PublicKey(CONFIG.streamflow.poolId);
        const mint = new solanaWeb3.PublicKey(CONFIG.ca);

        const res = await connection.getParsedTokenAccountsByOwner(owner, { mint });

        let amount = 0;
        if (res.value.length > 0) {
            amount = res.value[0].account.data.parsed.info.tokenAmount.uiAmount;
        }

        document.getElementById("total-staked").innerText = amount.toLocaleString();

    } catch (e) {
        console.log(e);
    }
}

fetchBlockchainStats();
setInterval(fetchBlockchainStats, 60000);
setInterval(fetchUserBalance, 15000);
</script>
</body>
</html>
