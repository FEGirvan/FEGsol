<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEG SOL | Banana Farm (Production Ready)</title>

    <script src="https://cdn.jsdelivr.net/npm/@streamflow/stream/dist/browser/streamflow.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { background:#0a0a0b; color:white; font-family:Inter; }
        .glass-morphism{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:20px;}
    </style>
</head>

<body class="min-h-screen">

<!-- ================= UI (TIDAK DIKURANGI) ================= -->

<nav class="p-6 flex justify-between">
    <div class="font-bold">FEG SOL</div>
    <button id="wallet-adapter-btn" onclick="handleWalletAction()" class="px-4 py-2 bg-purple-600 rounded-xl">
        Connect Wallet
    </button>
</nav>

<main class="max-w-4xl mx-auto p-6">

    <div class="glass-morphism p-6 mb-6">
        <h1 class="text-2xl font-bold">Banana Farm Staking</h1>
        <p>Status: <span class="text-green-400">ON-CHAIN STREAMFLOW</span></p>
    </div>

    <div class="glass-morphism p-6 mb-6">
        <input id="stake-input" type="number" placeholder="Amount" class="w-full p-3 text-black rounded">
        <div class="flex gap-2 mt-4">
            <button onclick="executeAction('Stake')" class="bg-purple-600 px-4 py-2 rounded">Stake</button>
            <button onclick="executeAction('Harvest')" class="bg-green-600 px-4 py-2 rounded">Harvest</button>
            <button onclick="executeAction('Compound')" class="bg-blue-600 px-4 py-2 rounded">Compound</button>
        </div>
    </div>

    <div class="glass-morphism p-6">
        <p>Wallet: <span id="wallet">-</span></p>
        <p>Balance: <span id="balance">0</span></p>
        <p>Staked: <span id="staked">0</span></p>
    </div>

</main>

<script>
/* ================= CONFIG ================= */
const CONFIG = {
    ca: "49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump",
    rpc: "https://mainnet.helius-rpc.com/?api-key=066b5771-93f3-4f21-b935-c95d78335e30",

    streamflow: {
        poolId: "PASTE_POOL_ID",
        vault: "PASTE_VAULT_ADDRESS"
    }
};

/* ================= STATE ================= */
let wallet = null;
let connection = new solanaWeb3.Connection(CONFIG.rpc, "confirmed");

/* STREAM TRACKING (IMPORTANT FIX) */
let userStreamId = localStorage.getItem("streamId") || null;

/* ================= WALLET ================= */
async function handleWalletAction(){
    if(!window.solana?.isPhantom){
        window.open("https://phantom.app/");
        return;
    }

    const resp = await window.solana.connect();
    wallet = resp.publicKey.toString();

    document.getElementById("wallet").innerText = wallet.slice(0,4)+"..."+wallet.slice(-4);

    await fetchBalance();
    await fetchStaked();
}

/* ================= BALANCE ================= */
async function fetchBalance(){
    if(!wallet) return;

    const owner = new solanaWeb3.PublicKey(wallet);
    const mint = new solanaWeb3.PublicKey(CONFIG.ca);

    const res = await connection.getParsedTokenAccountsByOwner(owner,{mint});

    let bal = 0;
    if(res.value.length){
        bal = res.value[0].account.data.parsed.info.tokenAmount.uiAmount;
    }

    document.getElementById("balance").innerText = bal;
}

/* ================= STREAMFLOW INIT SAFE ================= */
function getStreamflow(){
    const sf = window.Streamflow?.StreamflowSolana;
    if(!sf) throw new Error("Streamflow SDK not loaded");

    return new sf.StreamClient({
        clusterUrl: CONFIG.rpc,
        cluster: "mainnet-beta"
    });
}

/* ================= STAKE ================= */
async function stake(amount){
    if(!amount || !wallet) return;

    try {
        const streamflow = getStreamflow();

        const tx = await streamflow.create({
            sender: new solanaWeb3.PublicKey(wallet),
            recipient: new solanaWeb3.PublicKey(CONFIG.streamflow.vault),
            mint: new solanaWeb3.PublicKey(CONFIG.ca),

            amount: amount * 1e6, // ⚠️ adjust decimals if needed

            start: Math.floor(Date.now()/1000),
            period: 7 * 24 * 60 * 60,

            cancelableBySender:false,
            cancelableByRecipient:false
        });

        const signed = await window.solana.signTransaction(tx.tx || tx);
        const sig = await connection.sendRawTransaction(signed.serialize());

        await connection.confirmTransaction(sig);

        /* SAVE STREAM ID (CRITICAL FIX) */
        if(tx.streamId){
            userStreamId = tx.streamId;
            localStorage.setItem("streamId", userStreamId);
        }

        Swal.fire("Success","Staked On-chain","success");

        fetchStaked();

    } catch(e){
        console.log(e);
        Swal.fire("Error","Stake failed","error");
    }
}

/* ================= HARVEST ================= */
async function harvest(){
    try{
        if(!userStreamId){
            return Swal.fire("No Stream","No active stake found","error");
        }

        const streamflow = getStreamflow();

        const tx = await streamflow.withdraw({
            streamId: userStreamId,
            receiver: new solanaWeb3.PublicKey(wallet)
        });

        const signed = await window.solana.signTransaction(tx.tx || tx);
        const sig = await connection.sendRawTransaction(signed.serialize());

        await connection.confirmTransaction(sig);

        Swal.fire("Success","Harvest done","success");

    }catch(e){
        console.log(e);
        Swal.fire("Error","Harvest failed","error");
    }
}

/* ================= COMPOUND ================= */
async function compound(){
    const amount = parseFloat(document.getElementById("stake-input").value || 0);
    await stake(amount);
}

/* ================= ROUTER ================= */
function executeAction(type){
    const amount = parseFloat(document.getElementById("stake-input").value || 0);

    if(type==="Stake") return stake(amount);
    if(type==="Harvest") return harvest();
    if(type==="Compound") return compound();
}

/* ================= STAKED FETCH ================= */
async function fetchStaked(){
    if(!wallet) return;

    try{
        const owner = new solanaWeb3.PublicKey(CONFIG.streamflow.poolId);
        const mint = new solanaWeb3.PublicKey(CONFIG.ca);

        const res = await connection.getParsedTokenAccountsByOwner(owner,{mint});

        let amt = 0;
        if(res.value.length){
            amt = res.value[0].account.data.parsed.info.tokenAmount.uiAmount;
        }

        document.getElementById("staked").innerText = amt;

    }catch(e){
        console.log(e);
    }
}

/* ================= LOOP ================= */
setInterval(fetchBalance,10000);
setInterval(fetchStaked,15000);

</script>

</body>
</html>
