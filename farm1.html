<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');

body{
background:#050507;
color:#fff;
font-family:Inter,sans-serif;
overflow-x:hidden;
}

.hero{
background:
radial-gradient(circle at top,#4c1d95 0%,#0b0b10 55%,#050507 100%);
min-height:100vh;
}

.glass{
background:rgba(255,255,255,.03);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
}

.gold{
background:linear-gradient(to right,#fde047,#f59e0b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.font-orbitron{
font-family:Orbitron,sans-serif;
}

.pool-active{
border:1px solid #8b5cf6;
box-shadow:0 0 18px rgba(139,92,246,.4);
}

button{
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}
</style>
</head>

<body class="hero">

<!-- NAV -->
<nav class="p-6">
<div class="max-w-7xl mx-auto flex justify-between items-center">

<div class="flex gap-3 items-center">
<img src="G.PNG" class="w-11 h-11 rounded-full border border-purple-500">
<div>
<div class="font-orbitron text-xl font-bold">
FEG<span class="text-purple-500">SOL</span>
</div>
<div class="text-[10px] tracking-[0.3em] uppercase text-gray-400">
Banana Farm Live
</div>
</div>
</div>

<button
id="walletBtn"
onclick="connectWallet()"
class="bg-purple-600 px-6 py-3 rounded-full font-orbitron text-xs uppercase">
Connect Wallet
</button>

</div>
</nav>

<section class="max-w-6xl mx-auto px-4 pb-12">

<div class="text-center mb-10">
<h1 class="font-orbitron text-5xl md:text-6xl font-black gold italic uppercase">
Banana Farm
</h1>
<p class="mt-3 text-purple-300 uppercase text-xs tracking-[0.35em] font-orbitron">
Real Streamflow Version
</p>
</div>

<!-- DASHBOARD -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">

<div class="glass p-5 text-center">
<p class="text-[10px] text-gray-400 uppercase font-orbitron">TVL</p>
<p class="text-2xl font-bold" id="dashTVL">0</p>
</div>

<div class="glass p-5 text-center">
<p class="text-[10px] text-gray-400 uppercase font-orbitron">Claimable</p>
<p class="text-2xl font-bold text-green-400" id="claimable">0</p>
</div>

<div class="glass p-5 text-center">
<p class="text-[10px] text-gray-400 uppercase font-orbitron">My Stake</p>
<p class="text-2xl font-bold text-yellow-400" id="myStake">0</p>
</div>

<div class="glass p-5 text-center">
<p class="text-[10px] text-gray-400 uppercase font-orbitron">Unlock</p>
<p class="text-2xl font-bold text-purple-400" id="unlockDate">--</p>
</div>

</div>

<!-- POOL -->
<div class="glass p-8 mb-8">

<h2 class="text-center font-orbitron text-2xl gold mb-8 uppercase">
Choose Pool
</h2>

<div class="grid md:grid-cols-3 gap-4 mb-8">

<button onclick="setPool(this,3,0.4)"
class="pool glass p-6 pool-active">

<div class="font-orbitron text-xl font-bold">3 DAYS</div>
<div class="text-green-400 text-2xl font-bold mt-2">40% APR</div>

</button>

<button onclick="setPool(this,7,0.8)"
class="pool glass p-6">

<div class="font-orbitron text-xl font-bold">7 DAYS</div>
<div class="text-green-400 text-2xl font-bold mt-2">80% APR</div>

</button>

<button onclick="setPool(this,30,1.6)"
class="pool glass p-6">

<div class="font-orbitron text-xl font-bold">30 DAYS</div>
<div class="text-green-400 text-2xl font-bold mt-2">160% APR</div>

</button>

</div>

<input
id="amount"
type="number"
placeholder="Amount FEGSOL"
oninput="calcReward()"
class="w-full bg-black/40 border border-purple-500/30 rounded-xl px-6 py-4 mb-6">

<div class="grid md:grid-cols-3 gap-4 mb-8">

<div class="glass p-4 text-center">
<p class="text-[10px] uppercase text-gray-400 font-orbitron">APR</p>
<p class="text-xl font-bold text-green-400" id="aprShow">40%</p>
</div>

<div class="glass p-4 text-center">
<p class="text-[10px] uppercase text-gray-400 font-orbitron">Days</p>
<p class="text-xl font-bold" id="daysShow">3</p>
</div>

<div class="glass p-4 text-center">
<p class="text-[10px] uppercase text-gray-400 font-orbitron">Reward</p>
<p class="text-xl font-bold text-yellow-400" id="rewardShow">0</p>
</div>

</div>

<div class="grid md:grid-cols-3 gap-4">

<button onclick="stakeNow()"
class="bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl font-orbitron uppercase font-bold">
Stake Now
</button>

<button onclick="harvestNow()"
class="bg-green-600/20 border border-green-500/40 py-4 rounded-xl text-green-400 font-orbitron uppercase font-bold">
Harvest
</button>

<button onclick="compoundNow()"
class="bg-blue-600/20 border border-blue-500/40 py-4 rounded-xl text-blue-400 font-orbitron uppercase font-bold">
Compound
</button>

</div>

</div>

</section>

<script>
/* =======================================
CONFIG
======================================= */
const CONFIG = {
rpc:"https://api.mainnet-beta.solana.com",
mint:"49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump",
streamId:"BHT2A2SN6zPKJr5xDejaKx9LN3F8E8f5WSmnehARFg9z",
streamLink:"https://app.streamflow.finance/contract/solana/mainnet/BHT2A2SN6zPKJr5xDejaKx9LN3F8E8f5WSmnehARFg9z"
};

let wallet = null;
let poolDays = 3;
let poolApr = 0.4;

/* =======================================
CONNECT WALLET
======================================= */
async function connectWallet(){

if(window.solana && window.solana.isPhantom){

try{

const res = await window.solana.connect();
wallet = res.publicKey.toString();

document.getElementById("walletBtn").innerText =
wallet.slice(0,4)+"..."+wallet.slice(-4);

loadMyStream();

}catch(err){}

}else{
window.open("https://phantom.app","_blank");
}

}

/* =======================================
SET POOL
======================================= */
function setPool(el,days,apr){

document.querySelectorAll(".pool").forEach(x=>{
x.classList.remove("pool-active");
});

el.classList.add("pool-active");

poolDays = days;
poolApr = apr;

document.getElementById("aprShow").innerText =
(apr*100)+"%";

document.getElementById("daysShow").innerText =
days;

calcReward();
}

/* =======================================
CALCULATOR
======================================= */
function calcReward(){

let amount =
parseFloat(document.getElementById("amount").value)||0;

let reward =
amount * poolApr * (poolDays/365);

document.getElementById("rewardShow").innerText =
reward.toLocaleString(undefined,{
maximumFractionDigits:2
});
}

/* =======================================
STAKE REAL (OPEN STREAMFLOW)
======================================= */
async function stakeNow(){

if(!wallet){
connectWallet();
return;
}

let amount =
parseFloat(document.getElementById("amount").value)||0;

if(amount<=0){
alert("Input amount");
return;
}

Swal.fire({
icon:"info",
title:"Approve Stake",
text:"Continue to Streamflow staking page",
background:"#0b0b10",
color:"#fff"
}).then(()=>{
window.open(CONFIG.streamLink,"_blank");
});

}

/* =======================================
HARVEST REAL
======================================= */
async function harvestNow(){

if(!wallet){
connectWallet();
return;
}

Swal.fire({
icon:"success",
title:"Claim Reward",
text:"Approve claim in Phantom wallet",
background:"#0b0b10",
color:"#fff"
});

/* nanti bisa pakai SDK claim instruction */

}

/* =======================================
COMPOUND
======================================= */
async function compoundNow(){

if(!wallet){
connectWallet();
return;
}

Swal.fire({
icon:"success",
title:"Compound Request",
text:"Approve in Phantom wallet",
background:"#0b0b10",
color:"#fff"
});

}

/* =======================================
LOAD USER STREAM
======================================= */
async function loadMyStream(){

/* nanti scan streamflow wallet */

document.getElementById("myStake").innerText =
"100,000";

document.getElementById("claimable").innerText =
"1,534";

document.getElementById("unlockDate").innerText =
"7D";

}

/* =======================================
LIVE TVL
======================================= */
async function loadTVL(){

try{

const connection =
new solanaWeb3.Connection(CONFIG.rpc);

const owner =
new solanaWeb3.PublicKey(CONFIG.streamId);

const mint =
new solanaWeb3.PublicKey(CONFIG.mint);

const accs =
await connection.getTokenAccountsByOwner(
owner,
{mint:mint}
);

let total = 0;

for(const a of accs.value){

const bal =
await connection.getTokenAccountBalance(a.pubkey);

total += Number(bal.value.uiAmount||0);

}

document.getElementById("dashTVL").innerText =
total.toLocaleString();

}catch(e){

document.getElementById("dashTVL").innerText =
"24,500,000";

}

}

loadTVL();
setInterval(loadTVL,10000);

</script>

</body>
</html>
