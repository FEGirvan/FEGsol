<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FEG SOL | Banana Farm</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
    background:#0a0a0b;
    color:white;
    font-family:Inter;
}

.glass{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:18px;
}

.gorilla-header{
    background: radial-gradient(circle at top,#2e1065 0%,transparent 60%);
    padding:30px 20px;
    text-align:center;
}

.badge{
    display:inline-block;
    padding:6px 14px;
    border-radius:999px;
    font-size:11px;
    font-weight:bold;
}

.baby {background:#3b0764;color:#c084fc;}
.silver {background:#334155;color:#cbd5e1;}
.gold {background:#92400e;color:#fbbf24;}

.glow{
    text-shadow:0 0 10px rgba(124,58,237,.6);
}
</style>
</head>

<body>

<!-- 🔥 TOP GORILLA HEADER -->
<div class="gorilla-header">

    <img src="https://i.imgur.com/7kU8G5T.png" style="width:90px;margin:auto">

    <h1 style="font-size:28px;font-weight:bold;margin-top:10px">
        🦍 BANANA FARM STAKING
    </h1>

    <p style="opacity:0.7;font-size:12px">
        Powered by Streamflow • Solana Mainnet
    </p>

    <div style="margin-top:10px">
        <span id="gorilla-tier" class="badge baby">BABY APE</span>
    </div>

</div>

<!-- WALLET -->
<div class="max-w-xl mx-auto p-4">

<div class="glass p-4 flex justify-between items-center">
    <div>
        <div style="font-size:11px;opacity:0.6">Wallet</div>
        <div id="wallet">Not connected</div>
    </div>

    <button onclick="connectWallet()" class="bg-purple-600 px-4 py-2 rounded-xl text-sm">
        Connect
    </button>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 gap-3 mt-4">

<div class="glass p-4 text-center">
    <div style="font-size:10px;opacity:0.6">Balance</div>
    <div id="balance">0</div>
</div>

<div class="glass p-4 text-center">
    <div style="font-size:10px;opacity:0.6">Staked Pool</div>
    <div id="staked">0</div>
</div>

</div>

<!-- INPUT -->
<div class="glass p-4 mt-4">

<input id="amount" type="number"
placeholder="Amount FEGSOL"
class="w-full p-3 rounded bg-black border border-purple-500">

<!-- APR SELECT -->
<div class="grid grid-cols-3 gap-2 mt-3 text-center text-xs">

<button onclick="setAPR(0.4,this)" class="aprBtn glass p-2">40%</button>
<button onclick="setAPR(0.8,this)" class="aprBtn glass p-2">80%</button>
<button onclick="setAPR(1.6,this)" class="aprBtn glass p-2">160%</button>

</div>

<!-- ACTION -->
<div class="grid grid-cols-3 gap-2 mt-4">

<button onclick="stake()" class="bg-purple-600 p-2 rounded">Stake</button>
<button onclick="harvest()" class="bg-green-600 p-2 rounded">Harvest</button>
<button onclick="compound()" class="bg-blue-600 p-2 rounded">Compound</button>

</div>

</div>

</div>

<script>

/* CONFIG */
const CONFIG = {
ca:"49vATs18ocX8EQC4ry6bQpQAZjc2WRuo9HieWawspump",
pool:"BHT2A2SN6zPKJr5xDejaKx9LN3F8E8f5WSmnehARFg9z",
rpc:"https://mainnet.helius-rpc.com/?api-key=066b5771-93f3-4f21-b935-c95d78335e30"
};

let wallet=null;
let apr=0.8;

const connection = new solanaWeb3.Connection(CONFIG.rpc);

/* WALLET */
async function connectWallet(){
if(!window.solana){
alert("Install Phantom");
return;
}

const res = await window.solana.connect();
wallet = res.publicKey.toString();

document.getElementById("wallet").innerText =
wallet.slice(0,4)+"..."+wallet.slice(-4);

loadBalance();
loadPool();
}

/* BALANCE */
async function loadBalance(){
const owner = new solanaWeb3.PublicKey(wallet);
const mint = new solanaWeb3.PublicKey(CONFIG.ca);

const res = await connection.getParsedTokenAccountsByOwner(owner,{mint});

let bal=0;
if(res.value.length){
bal = res.value[0].account.data.parsed.info.tokenAmount.uiAmount;
}

document.getElementById("balance").innerText = bal;
}

/* POOL */
async function loadPool(){
const owner = new solanaWeb3.PublicKey(CONFIG.pool);
const mint = new solanaWeb3.PublicKey(CONFIG.ca);

const res = await connection.getParsedTokenAccountsByOwner(owner,{mint});

let amt=0;
if(res.value.length){
amt = res.value[0].account.data.parsed.info.tokenAmount.uiAmount;
}

document.getElementById("staked").innerText = amt;
}

/* APR */
function setAPR(v,el){
apr=v;

document.querySelectorAll(".aprBtn")
.forEach(b=>b.classList.remove("bg-purple-600"));

el.classList.add("bg-purple-600");
}

/* TIER SYSTEM */
function updateTier(amount){
let tier="BABY APE";
let cls="baby";

if(amount>=100000){
tier="SILVERBACK";
cls="silver";
}
if(amount>=1000000){
tier="GOLDEN KONG";
cls="gold";
}

const el=document.getElementById("gorilla-tier");
el.className="badge "+cls;
el.innerText=tier;
}

/* MOCK STAKE UI (Streamflow handled backend) */
function stake(){
let amount=parseFloat(document.getElementById("amount").value||0);

if(!wallet){
alert("Connect wallet");
return;
}

updateTier(amount);

Swal.fire("Stake sent","Go to Streamflow","success");
}

/* HARVEST */
function harvest(){
Swal.fire("Harvest","Redirect Streamflow withdraw","info");
}

/* COMPOUND */
function compound(){
Swal.fire("Compound","Restake flow","info");
}

/* LOOP */
setInterval(loadPool,15000);

</script>

</body>
</html>
